<style>
  :root{--cab:#1d2a1c;--wood:#5a3d23;--cream:#f2e8c9;--gold:#e8b840;}

  #ovshade{position:absolute;left:0;right:0;bottom:0;height:56%;

  #ov h2{font-size:14px;color:var(--gold);margin:0;text-shadow:0 3px 0 #1c1410;line-height:1.6;}

    border:3px solid #7a5a33;background:linear-gradient(#f7d060,#e8b840);color:#3a2410;
    box-shadow:0 4px 0 #7a5a33;}
  .go:active{transform:translateY(3px);box-shadow:0 1px 0 #7a5a33;}
  .go.teal{background:linear-gradient(#8fd8c8,#4fd8c8);border-color:#2d7a6e;box-shadow:0 4px 0 #2d7a6e;color:#0d2b26;}

'use strict';
/* ============ MYCELIUM ============
   Arcade cabinet #2. You are the mycelial thread:
   grow, absorb spores, fruit mushrooms, never cross yourself. */

const CW=420, CH=474, RS=2;
const cv=document.getElementById('cv');
cv.width=CW*RS; cv.height=CH*RS;
const ctx=cv.getContext('2d');
ctx.scale(RS,RS);

const safeStore={
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};

/* ---------- synth ---------- */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d=0.1,type='sine',v=0.14,delay=0,slide=0){
  const a=ac(); if(!a)return;
  const t0=a.currentTime+delay;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+d);
  g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+d+0.02);
}
const sfx={
  eat(){tone(700,.06,'square',.09);tone(1050,.05,'square',.06,.04);},
  fruit(){tone(523,.09,'sine',.11);tone(659,.09,'sine',.1,.07);tone(784,.14,'sine',.1,.14);},
  golden(){tone(880,.12,'sine',.1,0,-320);tone(560,.1,'sine',.08,.09,-160);},
  trippy(){for(let i=0;i<5;i++)tone(392*Math.pow(1.26,i),.12,'sine',.08,i*.06);},
  slugmunch(){tone(240,.12,'sawtooth',.07,0,-80);},
  die(){tone(392,.2,'triangle',.12);tone(311,.24,'triangle',.12,.18);tone(233,.4,'triangle',.12,.38);}
};

function dateStamp(){

function shareCard(){
  const W=800,H=1000;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const g=c.getContext('2d');
  g.fillStyle='#14100c';g.fillRect(0,0,W,H);
  const bg=ART.poster;
  if(bg&&bg.naturalWidth){
    const sc=Math.max(W/bg.naturalWidth,(H*0.72)/bg.naturalHeight);
    g.drawImage(bg,(W-bg.naturalWidth*sc)/2,0,bg.naturalWidth*sc,bg.naturalHeight*sc);
  }
  const gr=g.createLinearGradient(0,H*0.44,0,H);
  gr.addColorStop(0,'rgba(14,10,6,0)');
  gr.addColorStop(0.35,'rgba(14,10,6,.92)');
  gr.addColorStop(1,'rgba(10,7,4,.98)');
  g.fillStyle=gr;g.fillRect(0,H*0.44,W,H*0.56);
  g.strokeStyle='#5a3d23';g.lineWidth=10;g.strokeRect(5,5,W-10,H-10);
  const F='"Press Start 2P",monospace';
  g.textAlign='center';
  g.fillStyle='#f2e8c9';g.font='18px '+F;
  g.fillText("MITCHELL'S MUSHROOM FARM",W/2,H*0.60);
  g.font='56px '+F;
  g.fillText(String(S?S.score:0),W/2,H*0.70);
  g.font='16px '+F;g.fillStyle='#4fd8c8';
  g.fillText('LENGTH '+(S?S.body.length:0)+'  \u00b7  '+(S?S.fruits:0)+' FRUITED',W/2,H*0.755);
  g.fillStyle='#e8b840';g.font='15px '+F;
  g.fillText(dateStamp(),W/2,H*0.81);
  if(QR_IMG.naturalWidth){
    g.fillStyle='#f2e8c9';g.fillRect(W/2-72,H*0.835,144,144);
    g.drawImage(QR_IMG,W/2-68,H*0.835+4,136,136);
  }
  g.fillStyle='#8fa874';g.font='13px '+F;
  g.fillText('MITCHELLSMUSHROOMFARM.COM',W/2,H*0.985);
  c.toBlob(b=>{
    if(!b)return;
    const f=new File([b],'mycelium-score.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[f]})){
      navigator.share({files:[f],title:'Mycelium score'}).catch(()=>dlBlob(b));
    }else dlBlob(b);
  },'image/png');
}
function dlBlob(b){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='mycelium-score.png';
  document.body.appendChild(a);a.click();a.remove();
}

  };
  /* buried rocks: 3, away from the start row */
  while(S.rocks.length<3){
    const x=(Math.random()*N)|0, y=(Math.random()*N)|0;
    if(y===10&&x>=4&&x<=14)continue;
    if(S.rocks.some(r=>Math.abs(r.x-x)<3&&Math.abs(r.y-y)<3))continue;
    S.rocks.push({x,y});
  }
  placeFood();
}
function occupied(x,y,ignoreTail){
  const b=ignoreTail?S.body.slice(0,-1):S.body;
  if(b.some(s=>s.x===x&&s.y===y))return true;
  if(S.rocks.some(r=>r.x===x&&r.y===y))return true;
  if(S.slug&&S.slug.x===x&&S.slug.y===y)return true;
  return false;
}
function placeFood(){
  /* every 5th find is a fruiting mushroom; golden spore is a rare relief valve */
  let kind='spore';
  if((S.eaten+1)%5===0)kind='shroom';
  else if(S.body.length>12&&Math.random()<0.08)kind='golden';
  let x,y,guard=0;
  do{
    x=(Math.random()*N)|0;y=(Math.random()*N)|0;guard++;
  }while((occupied(x,y,false)||S.mold[key(x,y)]!==undefined||S.decor[key(x,y)]!==undefined||(S.food&&S.food.x===x&&S.food.y===y))&&guard<500);
  S.food={x,y};
  S.foodKind=kind;
  S.foodSprite=SHROOMS[(Math.random()*SHROOMS.length)|0];
}
function floats(text,c,x,y){S.floats.push({text,c,x,y,t:1.0});}

/* ---------- slug ---------- */
function maybeSpawnSlug(){
  if(S.slug||S.body.length<15)return;
  /* enter from a random edge, far from the head */
  const head=S.body[0];
  let guard=0;
  while(guard++<200){
    const side=(Math.random()*4)|0;
    const x=side===0?0:side===1?N-1:(Math.random()*N)|0;
    const y=side<2?(Math.random()*N)|0:(side===2?0:N-1);
    if(Math.abs(x-head.x)+Math.abs(y-head.y)<8)continue;
    if(occupied(x,y,false))continue;
    S.slug={x,y,dir:x===0?'right':x===N-1?'left':y===0?'down':'up'};
    floats('A SLUG!','#c8a06a',BX+x*CELL,BY+y*CELL);
    return;
  }
}
function slugStep(){
  const sl=S.slug;
  if(!sl)return;
  /* munch any fruited mushroom it sits on */
  const k=key(sl.x,sl.y);
  if(S.decor[k]!==undefined){
    delete S.decor[k];
    sfx.slugmunch();
    floats('MUNCHED!','#e86a4a',BX+sl.x*CELL,BY+sl.y*CELL);
  }
  /* wander: prefer current dir, avoid snake body & rocks & walls */
  const opts=[sl.dir,sl.dir,'up','down','left','right'].filter(d=>{
    const [dx,dy]=DIRS[d];
    const nx=sl.x+dx, ny=sl.y+dy;
    if(nx<0||ny<0||nx>=N||ny>=N)return false;
    if(S.body.some(s=>s.x===nx&&s.y===ny))return false;
    if(S.rocks.some(r=>r.x===nx&&r.y===ny))return false;
    return true;
  });
  if(!opts.length)return;
  sl.dir=opts[(Math.random()*opts.length)|0];
  const [dx,dy]=DIRS[sl.dir];
  sl.x+=dx;sl.y+=dy;
}

/* ---------- contamination: the green mold ---------- */
function moldSeed(){
  const head=S.body[0];
  let guard=0;
  while(guard++<300){
    const x=(Math.random()*N)|0, y=(Math.random()*N)|0;
    if(Math.abs(x-head.x)+Math.abs(y-head.y)<6)continue;
    const k=key(x,y);
    if(S.mold[k]!==undefined)continue;
    if(S.rocks.some(r=>r.x===x&&r.y===y))continue;
    if(S.body.some(b=>b.x===x&&b.y===y))continue;
    S.mold[k]=1;S.moldCells++;
    sfx.slugmunch();
    floats('CONTAMINATION!','#7ac83f',BX+x*CELL,BY+y*CELL-6);
    return;
  }
}
function moldSpread(){
  /* one random mold cell colonizes one adjacent cell.
     Healthy mycelium (your body) BLOCKS the spread — you are the wall. */
  const cells=Object.keys(S.mold);
  if(!cells.length)return;
  for(let attempt=0;attempt<12;attempt++){
    const [x,y]=cells[(Math.random()*cells.length)|0].split(',').map(Number);
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    const [dx,dy]=dirs[(Math.random()*4)|0];
    const nx=x+dx, ny=y+dy;
    if(nx<0||ny<0||nx>=N||ny>=N)continue;
    const k=key(nx,ny);
    if(S.mold[k]!==undefined)continue;
    if(S.rocks.some(r=>r.x===nx&&r.y===ny))continue;
    if(S.body.some(b=>b.x===nx&&b.y===ny))continue;   /* blocked by the network */
    if(S.decor[k]!==undefined)delete S.decor[k];       /* it eats your garden */
    S.mold[k]=1;S.moldCells++;
    return;
  }
}
function purgeMold(cx,cy){
  /* fruiting purges all mold within radius 2 — the fruit is the medicine */
  let purged=0;
  for(let dx=-2;dx<=2;dx++)for(let dy=-2;dy<=2;dy++){
    const k=key(cx+dx,cy+dy);
    if(S.mold[k]!==undefined){delete S.mold[k];S.moldCells--;purged++;}
  }
  if(purged){
    S.score+=purged*5;
    floats('PURGED ×'+purged+'! +'+(purged*5),'#7ae8a0',BX+cx*CELL,BY+cy*CELL-20);
    tone(880,.08,'square',.08);tone(1320,.1,'square',.06,.06);
  }
  return purged;
}

/* ---------- tick ---------- */
function turn(d){
  if(!running||over)return;
  const last=S.queue.length?S.queue[S.queue.length-1]:S.dir;
  if(d===last||d===OPP[last])return;
  if(S.queue.length<2)S.queue.push(d);
}
function tick(){
  if(S.queue.length)S.dir=S.queue.shift();
  const [dx,dy]=DIRS[S.dir];
  const head=S.body[0];
  const nx=head.x+dx, ny=head.y+dy;
  /* wall death: the network hits the property line */
  if(nx<0||ny<0||nx>=N||ny>=N){die('wall');return;}
  if(S.rocks.some(r=>r.x===nx&&r.y===ny)){die('rock');return;}
  if(S.slug&&S.slug.x===nx&&S.slug.y===ny){die('slug');return;}
  if(S.mold[key(nx,ny)]!==undefined){die('mold');return;}
  /* crossing your OWN thread is safe — one organism. Hyphae fuse. */
  const crossed=S.body.some(s=>s.x===nx&&s.y===ny);
  if(crossed){
    S.score+=2;
    if(Math.random()<0.3)floats('+2 FUSE','#4fd8c8',BX+nx*CELL,BY+ny*CELL-6);
  }

  S.body.unshift({x:nx,y:ny});
  if(S.grow>0)S.grow--;
  else S.body.pop();

  /* eat */
  if(S.food&&S.food.x===nx&&S.food.y===ny){
    S.eaten++;
    if(S.foodKind==='spore'){
      S.grow+=1;S.score+=10;
      sfx.eat();
    }else if(S.foodKind==='shroom'){
      S.grow+=3;S.score+=50;S.fruits++;
      S.decor[key(nx,ny)]=S.trippy?TRIPPY[(Math.random()*4)|0]:S.foodSprite;
      sfx.fruit();
      floats('FRUITED! +50','#e8b840',BX+nx*CELL,BY+ny*CELL-8);
      purgeMold(nx,ny);
    }else{ /* golden: shrink relief */
      S.score+=25;
      const target=Math.max(4,S.body.length-3);
      while(S.body.length>target)S.body.pop();
      sfx.golden();
      floats('SHRUNK -3','#f7d060',BX+nx*CELL,BY+ny*CELL-8);
    }
    placeFood();
    /* speed ramp: 7 -> 11 ticks/s */
    S.rate=Math.min(11,7+S.eaten*0.12);
    /* the network wakes up */
    if(!S.trippy&&S.body.length+S.grow>=25){
      S.trippy=true;
      sfx.trippy();
      floats('THE NETWORK AWAKENS','#ff7ad9',CW/2,BY+N*CELL*0.4);
    }
    maybeSpawnSlug();
  }

  /* slug moves every other tick */
  S.slugTick++;
  if(S.slugTick%2===0)slugStep();

  /* contamination clock */
  S.moldSeedT-=1/S.rate;
  if(S.moldSeedT<=0){moldSeed();S.moldSeedT=20+rnd(10);}
  S.moldT+=1/S.rate;
  if(S.moldT>=S.moldRate){
    S.moldT=0;
    moldSpread();
    S.moldRate=Math.max(1.1,S.moldRate-0.012);   /* slowly accelerates */
  }
  if(S.moldCells>N*N*0.45)die('overrun');
}
function die(cause){
  S.dead=true;
  S.deathBy=cause||'';
  endRun();
}

/* ---------- input ---------- */
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  const map={arrowup:'up',w:'up',arrowdown:'down',s:'down',arrowleft:'left',a:'left',arrowright:'right',d:'right'};
  if(map[k]){e.preventDefault();turn(map[k]);}
  else if(k==='enter'&&(!running||over))start();
});
let tx0=null,ty0=null;
addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
addEventListener('touchmove',e=>{
  if(tx0===null)return;
  const dx=e.touches[0].clientX-tx0, dy=e.touches[0].clientY-ty0;
  if(Math.abs(dx)<24&&Math.abs(dy)<24)return;
  turn(Math.abs(dx)>Math.abs(dy)?(dx<0?'left':'right'):(dy<0?'up':'down'));
  tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;
},{passive:true});
addEventListener('touchend',()=>{tx0=null;ty0=null;},{passive:true});

/* ---------- flow ---------- */
const ov=document.getElementById('ov'),ovtitle=document.getElementById('ovtitle'),
      ovbody=document.getElementById('ovbody'),startbtn=document.getElementById('startbtn'),
      sharebtn=document.getElementById('sharebtn');
startbtn.addEventListener('click',start);
sharebtn.addEventListener('click',shareCard);
function start(){
  reset();
  running=true;over=false;
  ov.style.display='none';
  ac()&&ac().resume&&ac().resume();
  tPrev=performance.now();
  requestAnimationFrame(loop);
  tone(523,.1);tone(784,.12,'square',.1,.08);
}
function endRun(){
  over=true;running=false;
  sfx.die();
  const best=+(safeStore.get('mmf_myc_best')||0);
  const isRec=S.score>best;
  if(isRec)safeStore.set('mmf_myc_best',String(S.score));
  const TITLES={wall:'THE THREAD BREAKS',rock:'THE THREAD BREAKS',
    slug:'SLIMED BY THE SLUG',mold:'THE MOLD GOT YOU',overrun:'THE BED IS LOST'};
  ovtitle.textContent=TITLES[S.deathBy]||'THE THREAD BREAKS';
  ovbody.innerHTML='SCORE: '+S.score+' &nbsp;&middot;&nbsp; LENGTH '+S.body.length+
    ' &nbsp;&middot;&nbsp; '+S.fruits+' FRUITED'+
    (isRec?'<br><span style="color:#e8b840">&#9733; NEW BEST! &#9733;</span>'
          :'<br>BEST: '+Math.max(best,S.score))+
    '<br><span style="color:#8fa874;font-size:7px">'+dateStamp()+'</span>';
  startbtn.innerHTML='GROW AGAIN &#9654;';
  sharebtn.style.display='inline-block';
  ov.style.display='flex';
}

/* ---------- update/render ---------- */
function update(dt){
  S.t+=dt;
  S.acc+=dt;
  const step=1/S.rate;
  while(S.acc>=step&&!over){S.acc-=step;tick();}
  for(const f of S.floats){f.y-=26*dt;f.t-=dt;}
  S.floats=S.floats.filter(f=>f.t>0);
}
function cellXY(x,y){return [BX+x*CELL+CELL/2, BY+y*CELL+CELL/2];}
function drawSprite(k,cx,cy,h){
  const im=ART[k];
  if(!im||!im._ok)return false;
  const w=h*(im.width/im.height);
  ctx.drawImage(im,cx-w/2,cy+CELL*0.38-h,w,h);
  return true;
}
function render(){
  /* soil: warm turned earth, not void */
  const soil=ctx.createLinearGradient(0,0,0,CH);
  soil.addColorStop(0,'#2e2114');
  soil.addColorStop(0.5,'#2a1e12');
  soil.addColorStop(1,'#241a0f');
  ctx.fillStyle=soil;
  ctx.fillRect(0,0,CW,CH);
  /* organic patches (deterministic) */
  for(let i=0;i<9;i++){
    const x=(i*167)%CW, y=52+((i*211)%(CH-80)), r=44+(i*37)%50;
    const g2=ctx.createRadialGradient(x,y,4,x,y,r);
    const dark=i%2===0;
    g2.addColorStop(0,dark?'rgba(20,14,8,.35)':'rgba(90,61,35,.16)');
    g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(x-r,y-r,r*2,r*2);
  }
  /* flecks: grit, pebbles, root bits */
  for(let i=0;i<110;i++){
    const x=(i*97)%CW, y=40+((i*61)%(CH-60));
    ctx.fillStyle=i%3===0?'rgba(140,105,64,.20)':(i%3===1?'rgba(60,42,24,.35)':'rgba(122,90,51,.14)');
    ctx.fillRect(x,y,i%4===0?3:2,2);
  }
  /* soft vignette keeps focus on the bed */
  const vg=ctx.createRadialGradient(CW/2,CH*0.52,CW*0.30,CW/2,CH*0.52,CW*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(16,11,6,.34)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,CW,CH);
  /* board border */
  ctx.strokeStyle='rgba(122,90,51,.55)';ctx.lineWidth=3;
  ctx.strokeRect(BX-4,BY-4,N*CELL+8,N*CELL+8);

  if(S){
    const hue=(S.t*70)%360;
    /* the creeping green mold */
    for(const k in S.mold){
      const [x,y]=k.split(',').map(Number);
      const [cx,cy]=cellXY(x,y);
      const pul=0.8+0.2*Math.sin(S.t*3+x*1.7+y*2.3);
      ctx.fillStyle='rgba(74,122,47,'+(0.85*pul)+')';
      ctx.beginPath();ctx.arc(cx,cy,CELL*0.52,0,7);ctx.fill();
      ctx.fillStyle='rgba(122,200,63,'+(0.5*pul)+')';
      ctx.beginPath();
      ctx.arc(cx-4,cy-3,2.4,0,7);
      ctx.arc(cx+3,cy+2,1.9,0,7);
      ctx.arc(cx+4,cy-4,1.5,0,7);
      ctx.fill();
    }
    /* fruited garden decor */
    for(const k in S.decor){
      const [x,y]=k.split(',').map(Number);
      const [cx,cy]=cellXY(x,y);
      drawSprite(S.decor[k],cx,cy,22);
    }
    /* rocks */
    for(const r of S.rocks){
      const [cx,cy]=cellXY(r.x,r.y);
      ctx.fillStyle='#5c6668';
      ctx.beginPath();
      ctx.moveTo(cx-8,cy+7);ctx.lineTo(cx-6,cy-6);ctx.lineTo(cx+3,cy-8);
      ctx.lineTo(cx+8,cy-1);ctx.lineTo(cx+6,cy+7);
      ctx.closePath();ctx.fill();
      ctx.fillStyle='#79868a';
      ctx.beginPath();ctx.ellipse(cx-1,cy-3,4,3,0,0,7);ctx.fill();
    }
    /* food */
    if(S.food){
      const [cx,cy]=cellXY(S.food.x,S.food.y);
      if(S.foodKind==='shroom'){
        const pul=1+0.08*Math.sin(S.t*4);
        drawSprite(S.foodSprite,cx,cy,24*pul);
        const gg=ctx.createRadialGradient(cx,cy,2,cx,cy,20);
        gg.addColorStop(0,'rgba(232,184,64,.35)');
        gg.addColorStop(1,'rgba(232,184,64,0)');
        ctx.fillStyle=gg;ctx.fillRect(cx-20,cy-20,40,40);
      }else{
        const pul=0.6+0.4*Math.sin(S.t*5);
        const col=S.foodKind==='golden'?'247,208,96':'79,216,200';
        const gg=ctx.createRadialGradient(cx,cy,1,cx,cy,13);
        gg.addColorStop(0,'rgba('+col+','+(0.9*pul)+')');
        gg.addColorStop(1,'rgba('+col+',0)');
        ctx.fillStyle=gg;ctx.fillRect(cx-13,cy-13,26,26);
        ctx.fillStyle='rgba('+col+',.95)';
        ctx.beginPath();ctx.arc(cx,cy,3.4,0,7);ctx.fill();
      }
    }
    /* the hypha: one continuous tapering thread, head to tail */
    if(S.body.length>1){
      ctx.lineCap='round';ctx.lineJoin='round';
      const pts=S.body.map(seg=>cellXY(seg.x,seg.y));
      /* soft glow underlay */
      for(let i=0;i<pts.length-1;i++){
        const f=1-i/S.body.length;
        ctx.strokeStyle=S.trippy?'hsla('+((hue+i*14)%360)+',85%,60%,'+(0.08+f*0.10)+')'
                                :'rgba(79,216,200,'+(0.05+f*0.09)+')';
        ctx.lineWidth=(5+f*9)+7;
        ctx.beginPath();
        ctx.moveTo(pts[i][0],pts[i][1]);
        ctx.lineTo(pts[i+1][0],pts[i+1][1]);
        ctx.stroke();
      }
      /* the thread itself */
      for(let i=0;i<pts.length-1;i++){
        const f=1-i/S.body.length;
        ctx.strokeStyle=S.trippy?'hsl('+((hue+i*14)%360)+',85%,'+(45+f*25)+'%)'
                                :'rgb('+(210-f*30|0)+','+(200-f*20|0)+','+(168-f*24|0)+')';
        ctx.lineWidth=2.4+f*5.2;
        ctx.beginPath();
        ctx.moveTo(pts[i][0],pts[i][1]);
        ctx.lineTo(pts[i+1][0],pts[i+1][1]);
        ctx.stroke();
      }
      /* root-hair filaments branching off the thread */
      ctx.strokeStyle=S.trippy?'hsla('+hue+',80%,70%,.35)':'rgba(226,214,178,.35)';
      ctx.lineWidth=1.2;
      ctx.beginPath();
      for(let i=2;i<pts.length-1;i+=2){
        const [ax,ay]=pts[i], [bx,by]=pts[i+1];
        const dx=bx-ax, dy=by-ay;
        const L=Math.hypot(dx,dy)||1;
        const px=-dy/L, py=dx/L;
        const side=((S.body[i].x*7+S.body[i].y*13)%2)?1:-1;
        const f=1-i/S.body.length;
        const hl=4+f*5;
        ctx.moveTo(ax,ay);
        ctx.lineTo(ax+px*side*hl+dx*0.3,ay+py*side*hl+dy*0.3);
      }
      ctx.stroke();
    }
    /* head node highlight (brighter fusion node when crossing yourself) */
    const [hx,hy]=cellXY(S.body[0].x,S.body[0].y);
    const fusing=S.body.slice(1).some(b=>b.x===S.body[0].x&&b.y===S.body[0].y);
    if(fusing){
      ctx.fillStyle='rgba(79,216,200,.5)';
      ctx.beginPath();ctx.arc(hx,hy,9,0,7);ctx.fill();
    }
    ctx.fillStyle='#f2ecd4';
    ctx.beginPath();ctx.arc(hx,hy,fusing?4.2:3,0,7);ctx.fill();

    /* slug */
    if(S.slug){
      const [cx,cy]=cellXY(S.slug.x,S.slug.y);
      ctx.save();
      if(S.slug.dir==='left'){ctx.translate(cx,0);ctx.scale(-1,1);ctx.translate(-cx,0);}
      if(!drawSprite('slug',cx,cy,20)){
        ctx.fillStyle='#c8a06a';
        ctx.beginPath();ctx.ellipse(cx,cy,9,6,0,0,7);ctx.fill();
      }
      ctx.restore();
    }

    /* floats */
    ctx.textAlign='center';
    for(const f of S.floats){
      ctx.globalAlpha=Math.min(1,f.t*2);
      ctx.font='9px "Press Start 2P",monospace';
      ctx.fillStyle='#1c1410';ctx.fillText(f.text,f.x+2,f.y+2);
      ctx.fillStyle=f.c;ctx.fillText(f.text,f.x,f.y);
    }
    ctx.globalAlpha=1;

    /* trippy wash */
    if(S.trippy){
      ctx.fillStyle='hsla('+hue+',80%,55%,0.05)';
      ctx.fillRect(0,0,CW,CH);
    }

    /* HUD plaque */
    ctx.textAlign='left';
    ctx.font='11px "Press Start 2P",monospace';
    ctx.fillStyle='rgba(26,18,10,.85)';
    ctx.fillRect(6,6,CW-12,32);
    ctx.strokeStyle='rgba(122,90,51,.8)';ctx.lineWidth=2;
    ctx.strokeRect(7,7,CW-14,30);
    ctx.fillStyle='#f2e8c9';
    ctx.fillText(String(S.score),16,28);
    ctx.fillStyle='#4fd8c8';
    ctx.fillText('LEN '+(S.body.length),120,28);
    ctx.fillStyle='#e8b840';
    ctx.fillText('\u{1F344}'+S.fruits,236,28);
    if(S.trippy){
      ctx.textAlign='right';
      ctx.fillStyle='hsl('+hue+',85%,65%)';
      ctx.fillText('AWAKE',CW-16,28);
      ctx.textAlign='left';
    }
  }
}

/* ---------- loop ---------- */
function loop(t){
  const dt=Math.min(0.05,(t-tPrev)/1000);
  tPrev=t;
  if(running&&!over)update(dt);
  render();
  if(running||over)requestAnimationFrame(loop);
}
/* attract render */
reset();render();
</script>
</body>
