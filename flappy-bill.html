<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flappy Bill — Mitchell's Mushroom Farm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{--cab:#1d2a1c;--wood:#5a3d23;--cream:#f2e8c9;--gold:#e8b840;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--cab);}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;font-family:'Press Start 2P',monospace;color:var(--cream);
    background:radial-gradient(ellipse at 50% -10%, #34502c 0%, var(--cab) 60%);
    touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden;
  }
  #stage{width:min(96vw, calc(100dvh * 0.70), 560px);}
  #frame{position:relative;width:100%;border:3px solid var(--wood);border-radius:10px;
    box-shadow:0 8px 40px rgba(0,0,0,.55), inset 0 0 0 2px rgba(242,232,201,.06);
    overflow:hidden;background:#0d1813;}
  canvas{display:block;width:100%;height:auto;image-rendering:auto;border-radius:7px;}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    text-align:center;padding:16px 16px 22px;gap:10px;
    background:#1d2a1c;background-size:cover;background-position:center 40%;}
  #ovshade{position:absolute;left:0;right:0;bottom:0;height:60%;
    background:linear-gradient(rgba(14,10,6,0) 0%, rgba(14,10,6,.85) 46%, rgba(10,7,4,.95) 100%);
    pointer-events:none;}
  #ov>*{position:relative;}
  #ov h2{font-size:14px;color:var(--gold);margin:0;text-shadow:0 3px 0 #1c1410;line-height:1.6;}
  #ov p{font-size:8px;line-height:2;color:var(--cream);margin:0;max-width:40ch;text-shadow:0 2px 3px rgba(0,0,0,.8);}
  .go{font-family:inherit;font-size:10px;padding:12px 18px;border-radius:9px;cursor:pointer;
    border:3px solid #7a5a33;background:linear-gradient(#f7d060,#e8b840);color:#3a2410;
    box-shadow:0 4px 0 #7a5a33;}
  .go:active{transform:translateY(3px);box-shadow:0 1px 0 #7a5a33;}
  .go.teal{background:linear-gradient(#8fd8c8,#4fd8c8);border-color:#2d7a6e;box-shadow:0 4px 0 #2d7a6e;color:#0d2b26;}
  .go.teal:active{box-shadow:0 1px 0 #2d7a6e;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .keys{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;display:none;}
  @media (hover:hover) and (pointer:fine){ .keys{display:block;} }
  #tap{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;}
  @media (hover:hover) and (pointer:fine){ #tap{display:none;} }
</style>

<script>
'use strict';
/* ============ FLAPPY BILL ============
   Arcade cabinet #5. Bill finally flies —
   through the gaps in a giant mushroom forest. */

const CW=420, CH=580, RS=2;
const cv=document.getElementById('cv');
cv.width=CW*RS; cv.height=CH*RS;
const ctx=cv.getContext('2d');
ctx.scale(RS,RS);

const safeStore={
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};

/* ---------- synth ---------- */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d=0.1,type='sine',v=0.14,delay=0,slide=0){
  const a=ac(); if(!a)return;
  const t0=a.currentTime+delay;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+d);
  g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+d+0.02);
}
const sfx={
  flap(){tone(280,.07,'square',.09,0,140);},
  score(){tone(880,.06,'square',.08);tone(1320,.06,'square',.06,.05);},
  mane(){tone(523,.08,'sine',.1);tone(784,.12,'sine',.1,.07);},
  dusk(){tone(392,.2,'sine',.09);tone(494,.24,'sine',.08,.14);},
  rush(){for(let i=0;i<5;i++)tone(392*Math.pow(1.26,i),.1,'sine',.08,i*.05);},
  hit(){tone(120,.2,'sawtooth',.14,0,-60);},
  quackfall(){tone(190,.3,'square',.12,0,-120);},
  over(){tone(392,.2,'triangle',.12);tone(311,.24,'triangle',.12,.18);tone(233,.4,'triangle',.12,.38);}
};

function dateStamp(){
  const M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const d=new Date();

function shareCard(){
  const W=800,H=1000;
  const c=document.createElement('canvas');c.width=W;c.height=H;
  const g=c.getContext('2d');
  g.fillStyle='#1d2a1c';g.fillRect(0,0,W,H);
  const bg=ART.poster;
  if(bg&&bg.naturalWidth){
    const sc=Math.max(W/bg.naturalWidth,(H*0.72)/bg.naturalHeight);
    g.drawImage(bg,(W-bg.naturalWidth*sc)/2,0,bg.naturalWidth*sc,bg.naturalHeight*sc);
  }
  const gr=g.createLinearGradient(0,H*0.44,0,H);
  gr.addColorStop(0,'rgba(14,10,6,0)');
  gr.addColorStop(0.35,'rgba(14,10,6,.92)');
  gr.addColorStop(1,'rgba(10,7,4,.98)');
  g.fillStyle=gr;g.fillRect(0,H*0.44,W,H*0.56);
  g.strokeStyle='#5a3d23';g.lineWidth=10;g.strokeRect(5,5,W-10,H-10);
  const F='"Press Start 2P",monospace';
  g.textAlign='center';
  g.fillStyle='#e8b840';g.font='32px '+F;
  g.fillText('FLAPPY BILL',W/2,H*0.55);
  g.fillStyle='#f2e8c9';g.font='18px '+F;
  g.fillText("MITCHELL'S MUSHROOM FARM",W/2,H*0.60);
  g.font='56px '+F;
  g.fillText(String(S?S.score:0),W/2,H*0.70);
  g.font='15px '+F;g.fillStyle='#9fd8e8';
  g.fillText((S?S.manes:0)+" LION'S MANES",W/2,H*0.755);
  g.fillStyle='#e8b840';g.font='15px '+F;
  g.fillText(dateStamp(),W/2,H*0.81);
  if(QR_IMG.naturalWidth){
    g.fillStyle='#f2e8c9';g.fillRect(W/2-72,H*0.835,144,144);
    g.drawImage(QR_IMG,W/2-68,H*0.835+4,136,136);
  }
  g.fillStyle='#8fa874';g.font='13px '+F;
  g.fillText('MITCHELLSMUSHROOMFARM.COM',W/2,H*0.985);
  c.toBlob(b=>{
    if(!b)return;
    const f=new File([b],'flappy-bill-score.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[f]})){
      navigator.share({files:[f],title:'Flappy Bill score'}).catch(()=>dlBlob(b));
    }else dlBlob(b);
  },'image/png');
}
function dlBlob(b){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);
  a.download='flappy-bill-score.png';
  document.body.appendChild(a);a.click();a.remove();
}

/* ---------- state ---------- */
let S=null, running=false, over=false, tPrev=0;
function rnd(n){return Math.random()*n;}
function gapSize(){return Math.max(148,172-S.score*0.8);}
function scrollSpeed(){return Math.min(168,120+S.score*1.2);}
function reset(){
  S={
    y:CH*0.42, vy:0,
    started:false, dead:false, deadT:0,
    score:0, manes:0,
    stalks:[],                /* {x,gapY,n,ci,drift,phase,scored,mane,maneTaken} */
    nextX:CW+80,
    dusk:false, rush:0, rushUsed:false,
    feathers:[], flies:[], floats:[],
    mitchX:null,
    t:0
  };
  while(S.nextX<CW+SPACING*3)spawnStalk();
}
function spawnStalk(){
  const n=S.stalks.length?S.stalks[S.stalks.length-1].n+1:1;
  const margin=90;
  const gapY=margin+70+rnd(CH-2*margin-170);
  S.stalks.push({
    x:S.nextX, gapY, n,
    ci:(n-1)%CAPCOLS.length,
    drift:n>=15?14+rnd(10):0,
    phase:rnd(6.28),
    scored:false,
    mane:n%10===0, maneTaken:false
  });
  S.nextX+=SPACING;
}
function gapCenter(st){
  return st.gapY+(st.drift?Math.sin(S.t*1.4+st.phase)*st.drift:0);
}
function floats(text,c,x,y){S.floats.push({text,c,x,y,t:1.0});}

/* ---------- flap ---------- */
function flap(){
  if(over)return;
  if(!running)return;
  if(S.dead)return;
  if(!S.started)S.started=true;
  S.vy=FLAP_V;
  sfx.flap();
  for(let i=0;i<3;i++)S.feathers.push({x:BILL_X-14,y:S.y+8,vx:-40-rnd(40),vy:-20+rnd(60),t:0.5+rnd(0.3)});
}

/* ---------- collision ---------- */
function billEllipse(){
  /* forgiving: ~70% of the sprite, biased off the tail */
  return {x:BILL_X+4,y:S.y,rx:19,ry:15};
}
function hitsStalk(st){
  const e=billEllipse();
  const gc=gapCenter(st);
  const half=gapSize()/2;
  const inX=e.x+e.rx>st.x-CAP_W/2&&e.x-e.rx<st.x+CAP_W/2;
  if(!inX)return false;
  /* clear if fully inside the gap */
  if(e.y-e.ry>gc-half&&e.y+e.ry<gc+half)return false;
  /* cap zone is wide; stem zone narrower */
  const inStemX=e.x+e.rx>st.x-STALK_W/2&&e.x-e.rx<st.x+STALK_W/2;
  const topCapY=gc-half, botCapY=gc+half;
  if(e.y-e.ry<topCapY){ /* upper obstacle */
    if(e.y-e.ry<topCapY-CAP_H)return inStemX;    /* along the hanging stem */
    return true;                                  /* the hanging cap */
  }
  if(e.y+e.ry>botCapY){
    if(e.y+e.ry>botCapY+CAP_H)return inStemX;    /* along the rising stem */
    return true;                                  /* the standing cap */
  }
  return false;
}

/* ---------- update ---------- */
function die(){
  if(S.rush>0&&!S.rushUsed){
    S.rushUsed=true;
    floats('RAINBOW SAVE!','#ff7ad9',BILL_X,S.y-30);
    return;
  }
  S.dead=true;
  S.deadT=0;
  S.vy=Math.min(S.vy,-120);
  sfx.hit();
  sfx.quackfall();
  S.mitchX=-40;
}
function update(dt){
  S.t+=dt;
  if(!S.started&&!S.dead){
    S.y=CH*0.42+Math.sin(S.t*2.2)*10;   /* attract float */
    return;
  }
  /* physics */
  S.vy+=GRAV*dt;
  S.y+=S.vy*dt;

  if(S.dead){
    S.deadT+=dt;
    if(S.y>GROUND-18){S.y=GROUND-18;S.vy=0;}
    if(S.mitchX!==null&&S.mitchX<BILL_X-46)S.mitchX+=170*dt;
    if(S.deadT>1.15)endRun();
    return;
  }

  /* ceiling & ground are solid */
  if(S.y<52){S.y=52;S.vy=0;die();}
  if(S.y>GROUND-16){S.y=GROUND-16;die();}
  if(S.dead){
    return;
  }

  /* stalks scroll */
  const sp=scrollSpeed();
  for(const st of S.stalks)st.x-=sp*dt;
  if(S.stalks.length&&S.stalks[0].x<-CAP_W)S.stalks.shift();
  S.nextX-=sp*dt;
  while(S.nextX<CW+SPACING)spawnStalk();

  for(const st of S.stalks){
    /* score exactly once, when the stalk passes Bill */
    if(!st.scored&&st.x+CAP_W/2<BILL_X-19){
      st.scored=true;
      S.score++;
      sfx.score();
      if(S.score===25&&!S.dusk){
        S.dusk=true;
        sfx.dusk();
        floats('DUSK FALLS...','#b48fd8',CW/2,CH*0.3);
      }
      if(S.score===50&&S.rush===0&&!S.rushUsed){
        S.rush=1;
        sfx.rush();
        floats('RAINBOW RUSH!','#ff7ad9',CW/2,CH*0.3);
      }else if(S.rush>0){
        S.rush=0;   /* the rush carries you through one stalk only */
      }
    }
    /* collision */
    if(hitsStalk(st)){die();break;}
    /* lion's mane bonus in every 10th gap */
    if(st.mane&&!st.maneTaken){
      const gc=gapCenter(st);
      if(Math.hypot(BILL_X-st.x,S.y-gc)<26){
        st.maneTaken=true;
        S.score+=5;S.manes++;
        sfx.mane();
        floats("+5 LION'S MANE!",'#e8b840',st.x,gc-30);
      }
    }
  }

  /* particles */
  for(const f of S.feathers){f.x+=f.vx*dt;f.y+=f.vy*dt;f.vy+=140*dt;f.t-=dt;}
  S.feathers=S.feathers.filter(f=>f.t>0);
  if(S.dusk&&Math.random()<0.06)S.flies.push({x:CW+8,y:80+rnd(GROUND-160),ph:rnd(6.28),t:9});
  for(const fl of S.flies){fl.x-=(sp*0.5)*dt;fl.t-=dt;}
  S.flies=S.flies.filter(fl=>fl.t>0&&fl.x>-10);
  for(const f of S.floats){f.y-=26*dt;f.t-=dt;}
  S.floats=S.floats.filter(f=>f.t>0);
}

/* ---------- flow ---------- */
const ov=document.getElementById('ov'),ovtitle=document.getElementById('ovtitle'),
      ovbody=document.getElementById('ovbody'),startbtn=document.getElementById('startbtn'),
      sharebtn=document.getElementById('sharebtn');
startbtn.addEventListener('click',start);
sharebtn.addEventListener('click',shareCard);
function start(){
  reset();
  running=true;over=false;
  ov.style.display='none';
  ac()&&ac().resume&&ac().resume();
  tPrev=performance.now();
  requestAnimationFrame(loop);
  tone(523,.1);tone(784,.12,'square',.1,.08);
}
function endRun(){
  over=true;running=false;
  sfx.over();
  const best=+(safeStore.get('mmf_flap_best')||0);
  const isRec=S.score>best;
  if(isRec)safeStore.set('mmf_flap_best',String(S.score));
  ovtitle.textContent='WIPEOUT!';
  ovbody.innerHTML='SCORE: '+S.score+" &nbsp;&middot;&nbsp; "+S.manes+" LION'S MANES"+
    (isRec?'<br><span style="color:#e8b840">&#9733; NEW BEST! &#9733;</span>'
          :'<br>BEST: '+Math.max(best,S.score))+
    '<br><span style="color:#8fa874;font-size:7px">'+dateStamp()+'</span>';
  startbtn.innerHTML='FLY AGAIN &#9654;';
  sharebtn.style.display='inline-block';
  ov.style.display='flex';
}

/* ---------- input ---------- */
cv.addEventListener('pointerdown',e=>{e.preventDefault();flap();});
addEventListener('keydown',e=>{
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(k===' '||k==='arrowup'||k==='w'){e.preventDefault();flap();}
  else if(k==='enter'&&(!running||over))start();
});

/* ---------- render ---------- */
function drawSprite(k,x,y,h,rot=0,flip=false){
  const im=ART[k];
  if(!im||!im._ok)return false;
  const w=h*(im.width/im.height);
  ctx.save();
  ctx.translate(x,y);
  if(flip)ctx.scale(-1,1);
  ctx.rotate(rot);
  ctx.drawImage(im,-w/2,-h/2,w,h);
  ctx.restore();
  return true;
}
function capHue(st){
  if(S.rush>0)return 'hsl('+((S.t*160+st.n*40)%360)+',85%,60%)';
  if(S.dusk)return '#3ec8b4';
  return null;
}
function drawStalk(st){
  const gc=gapCenter(st);
  const half=gapSize()/2;
  const C=CAPCOLS[st.ci];
  const hue=capHue(st);
  const stem='#e2d6b2', stemEdge='#b8a884';
  /* rising stalk */
  ctx.fillStyle=stem;
  ctx.fillRect(st.x-STALK_W/2,gc+half+CAP_H*0.55,STALK_W,GROUND-(gc+half));
  ctx.fillStyle=stemEdge;
  ctx.fillRect(st.x+STALK_W/2-5,gc+half+CAP_H*0.55,5,GROUND-(gc+half));
  /* its cap (dome up) */
  ctx.fillStyle=hue||C.top;
  ctx.beginPath();
  ctx.ellipse(st.x,gc+half+CAP_H*0.62,CAP_W/2,CAP_H*0.62,0,Math.PI,0);
  ctx.fill();
  ctx.fillStyle=hue?'rgba(0,0,0,.25)':C.rim;
  ctx.fillRect(st.x-CAP_W/2+6,gc+half+CAP_H*0.55,CAP_W-12,5);
  if(C.dots&&!hue){
    ctx.fillStyle=C.dots;
    ctx.beginPath();
    ctx.ellipse(st.x-CAP_W*0.22,gc+half+CAP_H*0.28,5,3.6,0,0,7);
    ctx.ellipse(st.x+CAP_W*0.16,gc+half+CAP_H*0.16,4,3,0,0,7);
    ctx.ellipse(st.x+CAP_W*0.3,gc+half+CAP_H*0.4,3.4,2.6,0,0,7);
    ctx.fill();
  }
  /* hanging stalk */
  ctx.fillStyle=stem;
  ctx.fillRect(st.x-STALK_W/2,0,STALK_W,Math.max(0,gc-half-CAP_H*0.55));
  ctx.fillStyle=stemEdge;
  ctx.fillRect(st.x+STALK_W/2-5,0,5,Math.max(0,gc-half-CAP_H*0.55));
  /* its cap (dome down) */
  ctx.fillStyle=hue||C.top;
  ctx.beginPath();
  ctx.ellipse(st.x,gc-half-CAP_H*0.62,CAP_W/2,CAP_H*0.62,0,0,Math.PI);
  ctx.fill();
  ctx.fillStyle=hue?'rgba(0,0,0,.25)':C.rim;
  ctx.fillRect(st.x-CAP_W/2+6,gc-half-CAP_H*0.62,CAP_W-12,5);
  /* glow halos at dusk */
  if(S.dusk&&!S.rush){
    const gg=ctx.createRadialGradient(st.x,gc+half+CAP_H*0.5,4,st.x,gc+half+CAP_H*0.5,60);
    gg.addColorStop(0,'rgba(79,216,200,.22)');
    gg.addColorStop(1,'rgba(79,216,200,0)');
    ctx.fillStyle=gg;ctx.fillRect(st.x-60,gc+half-30,120,120);
  }
  /* lion's mane bobbing in the gap */
  if(st.mane&&!st.maneTaken){
    const my=gc+Math.sin(S.t*3+st.phase)*8;
    if(!drawSprite('mane',st.x,my,34)){
      ctx.fillStyle='#f2e8c9';
      ctx.beginPath();ctx.arc(st.x,my,12,0,7);ctx.fill();
    }
    ctx.strokeStyle='rgba(232,184,64,.5)';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(st.x,my,19+Math.sin(S.t*5)*2,0,7);ctx.stroke();
  }
}
function render(){
  /* sky panorama, parallax */
  const bg=ART.sky;
  if(bg&&bg._ok){
    const sc=CH*0.92/bg.height;
    const w=bg.width*sc;
    const off=S?(S.t*8)%w:0;
    ctx.drawImage(bg,-off,0,w,CH*0.92);
    ctx.drawImage(bg,w-off-1,0,w,CH*0.92);
  }else{
    ctx.fillStyle='#3f9fd8';ctx.fillRect(0,0,CW,CH);
  }
  /* forest wall: two overlapping rows of the farm's trees, dense and close,
     rising about halfway up the screen. Back row (smaller, hazed) then front row. */
  const TREEK=['tree_1','tree_oak','tree_4','tree_6'];
  /* back row: hazier, smaller, slower parallax */
  const pB=86, offB=S?((S.t*20)%pB):0;
  for(let i=-1;i<=Math.ceil(CW/pB)+1;i++){
    const bx=i*pB-offB+((i%2)?14:0);
    const th=225+((i*53)%60);
    drawSprite(TREEK[((i*3)%TREEK.length+TREEK.length)%TREEK.length],bx,GROUND-16,th);
  }
  ctx.fillStyle=(S&&S.dusk)?'rgba(74,48,120,.34)':'rgba(150,200,214,.30)';
  ctx.fillRect(0,CH*0.30,CW,GROUND-CH*0.30-8);
  /* front row: bigger, denser, faster parallax — the canopy the stalks grow from */
  const pF=64, offF=S?((S.t*34)%pF):0;
  for(let i=-1;i<=Math.ceil(CW/pF)+1;i++){
    const bx=i*pF-offF+((i%2)?20:0);
    const th=285+((i*71)%84);
    drawSprite(TREEK[((i*2+1)%TREEK.length+TREEK.length)%TREEK.length],bx,GROUND-8,th);
  }
  ctx.fillStyle=(S&&S.dusk)?'rgba(74,48,120,.18)':'rgba(150,200,214,.12)';
  ctx.fillRect(0,CH*0.36,CW,GROUND-CH*0.36-8);
  /* dusk wash */
  if(S&&S.dusk){
    ctx.fillStyle='rgba(74,48,120,.30)';
    ctx.fillRect(0,0,CW,CH);
  }
  if(S&&S.rush>0){
    ctx.fillStyle='hsla('+((S.t*160)%360)+',80%,55%,.10)';
    ctx.fillRect(0,0,CW,CH);
  }

  if(S){
    /* stalks */
    for(const st of S.stalks)drawStalk(st);

    /* ground strip */
    const gr=ctx.createLinearGradient(0,GROUND-8,0,CH);
    gr.addColorStop(0,'#57905f');
    gr.addColorStop(1,'#2b5c33');
    ctx.fillStyle=gr;ctx.fillRect(0,GROUND-8,CW,CH-GROUND+8);
    const goff=(S.t*(S.started&&!S.dead?scrollSpeed():20))%110;
    for(let i=-1;i<5;i++){
      drawSprite('grass',i*110-goff+30,GROUND+16,22);
      if(i%2===0)drawSprite('shrooms',i*110-goff+80,GROUND+14,20);
    }

    /* fireflies at dusk */
    for(const fl of S.flies){
      const a=0.4+0.4*Math.sin(S.t*6+fl.ph);
      ctx.fillStyle='rgba(232,220,120,'+a+')';
      ctx.fillRect(fl.x,fl.y+Math.sin(S.t*2+fl.ph)*6,2.5,2.5);
    }

    /* feathers */
    for(const f of S.feathers){
      ctx.globalAlpha=Math.min(1,f.t*2.4);
      ctx.fillStyle='#f2e8c9';
      ctx.fillRect(f.x,f.y,3,2);
    }
    ctx.globalAlpha=1;

    /* Bill */
    let rot;
    if(S.dead){ rot=S.deadT*7; }
    else {
      const target=Math.max(-0.26,Math.min(0.42,S.vy/900));   /* gentle, mostly level */
      if(S._rot===undefined)S._rot=0;
      S._rot+=(target-S._rot)*0.18;                            /* smooth toward it */
      rot=S._rot;
    }
    if(!drawSprite('bill',BILL_X,S.y,52,rot)){
      ctx.save();ctx.translate(BILL_X,S.y);ctx.rotate(rot);
      ctx.fillStyle='#f2e8c9';
      ctx.beginPath();ctx.ellipse(0,0,22,16,0,0,7);ctx.fill();
      ctx.fillStyle='#e8b840';
      ctx.fillRect(16,-4,12,7);
      ctx.restore();
    }
    if(S.dead){ /* X eyes */
      ctx.strokeStyle='#1c1410';ctx.lineWidth=2;
      ctx.beginPath();
      ctx.moveTo(BILL_X+6,S.y-10);ctx.lineTo(BILL_X+13,S.y-3);
      ctx.moveTo(BILL_X+13,S.y-10);ctx.lineTo(BILL_X+6,S.y-3);
      ctx.stroke();
      /* Mitch runs in */
      if(S.mitchX!==null)drawSprite('mitch',S.mitchX,GROUND-18,116);
    }
    if(S.rush>0){ /* rainbow shimmer on Bill */
      ctx.strokeStyle='hsla('+((S.t*300)%360)+',90%,70%,.8)';
      ctx.lineWidth=2.5;
      ctx.beginPath();ctx.ellipse(BILL_X+4,S.y,26,20,0,0,7);ctx.stroke();
    }

    /* floats */
    ctx.textAlign='center';
    for(const f of S.floats){
      ctx.globalAlpha=Math.min(1,f.t*2);
      ctx.font='10px "Press Start 2P",monospace';
      ctx.fillStyle='#1c1410';ctx.fillText(f.text,f.x+2,f.y+2);
      ctx.fillStyle=f.c;ctx.fillText(f.text,f.x,f.y);
    }
    ctx.globalAlpha=1;

    /* score, big and centered like the classic */
    if(S.started||S.score>0){
      ctx.font='22px "Press Start 2P",monospace';
      ctx.textAlign='center';
      ctx.fillStyle='#1c1410';ctx.fillText(String(S.score),CW/2+2,66);
      ctx.fillStyle='#f2e8c9';ctx.fillText(String(S.score),CW/2,64);
      ctx.textAlign='left';
    }else if(!S.dead&&running){
      ctx.font='8px "Press Start 2P",monospace';
      ctx.textAlign='center';
      ctx.fillStyle='#f2e8c9';
      if(((S.t*2)|0)%2===0)ctx.fillText('TAP TO FLAP',CW/2,CH*0.3);
      ctx.textAlign='left';
    }
  }
}

/* ---------- loop ---------- */
function loop(t){
  const dt=Math.min(0.05,(t-tPrev)/1000);
  tPrev=t;
  if(running&&!over)update(dt);
  render();
  if(running||over)requestAnimationFrame(loop);
}
/* attract render */
reset();render();
</script>
</body>
</html>
