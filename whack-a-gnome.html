<style>
  :root{--cab:#1d2a1c;--wood:#5a3d23;--cream:#f2e8c9;--gold:#e8b840;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--cab);}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;font-family:'Press Start 2P',monospace;color:var(--cream);
    background:radial-gradient(ellipse at 50% -10%, #34502c 0%, var(--cab) 60%);
    touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden;
  }
  #stage{width:min(96vw, calc(100dvh * 0.70), 560px);}
  #frame{position:relative;width:100%;border:3px solid var(--wood);border-radius:10px;
    box-shadow:0 8px 40px rgba(0,0,0,.55), inset 0 0 0 2px rgba(242,232,201,.06);
    overflow:hidden;background:#0d1813;cursor:none;}
  canvas{display:block;width:100%;height:auto;image-rendering:auto;border-radius:7px;}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    text-align:center;padding:18px 18px 24px;gap:11px;cursor:auto;
    background:#1d2a1c;background-size:cover;background-position:center 30%;}
  #ovshade{position:absolute;left:0;right:0;bottom:0;height:66%;
    background:linear-gradient(rgba(18,28,18,0) 0%, rgba(18,28,18,.82) 42%, rgba(14,22,14,.94) 100%);
    pointer-events:none;}
  #ov>*{position:relative;}
  #ov h2{font-size:15px;color:var(--gold);margin:0;text-shadow:0 3px 0 #1c1410;line-height:1.6;}
  #ov p{font-size:8px;line-height:2;color:var(--cream);margin:0;max-width:38ch;text-shadow:0 2px 3px rgba(0,0,0,.8);}
  .go{font-family:inherit;font-size:10px;padding:12px 18px;border-radius:9px;cursor:pointer;
    border:3px solid #7a5a33;background:linear-gradient(#f7d060,#e8b840);color:#3a2410;
    box-shadow:0 4px 0 #7a5a33;}
  .go:active{transform:translateY(3px);box-shadow:0 1px 0 #7a5a33;}
  .go.teal{background:linear-gradient(#8fd8c8,#4fd8c8);border-color:#2d7a6e;box-shadow:0 4px 0 #2d7a6e;color:#0d2b26;}
  .go.teal:active{box-shadow:0 1px 0 #2d7a6e;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .keys{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;display:none;}
  @media (hover:hover) and (pointer:fine){ .keys{display:block;} }
  #tap{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;}
  @media (hover:hover) and (pointer:fine){ #tap{display:none;} }
</style>

<script>
'use strict';
/* ============ WHACK-A-GNOME ============
   Arcade cabinet #1 of Harry's Barn Arcade.
   Gnomes pop from mushroom-bed holes; bonk them, never Bill. */

const CW=420, CH=580, RS=2;
const cv=document.getElementById('cv');
cv.width=CW*RS; cv.height=CH*RS;
const ctx=cv.getContext('2d');
ctx.scale(RS,RS);

const safeStore={
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};

/* ---------- synth ---------- */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d=0.1,type='sine',v=0.14,delay=0,slide=0){
  const a=ac(); if(!a)return;
  const t0=a.currentTime+delay;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+d);
  g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+d+0.02);
}
const sfx={
  bonk(){tone(150,.09,'square',.16,0,-40);tone(900,.05,'square',.07);},
  whiff(){tone(300,.08,'triangle',.06,0,-120);},
  rat(){tone(900,.09,'square',.1,0,300);},
  bill(){tone(190,.28,'square',.14,0,-110);tone(150,.3,'square',.1,.16,-70);},
  billwarn(){tone(420,.07,'square',.06);},
  golden(){tone(523,.1,'sine',.11);tone(659,.1,'sine',.1,.08);tone(784,.12,'sine',.1,.16);tone(1046,.2,'sine',.09,.24);},
  heart(){tone(220,.2,'triangle',.12,0,-90);},
  tick(){tone(1100,.05,'square',.05);},
  over(){tone(392,.2,'triangle',.12);tone(311,.24,'triangle',.12,.18);tone(233,.4,'triangle',.12,.38);}
};

/* ---------- board geometry ---------- */
const BOARD_TOP=CH*0.30;
const HOLES=[];
for(let r=0;r<3;r++)for(let q=0;q<3;q++){
  HOLES.push({
    q,r,
    x:CW*(0.20+q*0.30),
    y:BOARD_TOP+58+r*((CH-BOARD_TOP-96)/2.6)
  });
}
const HOLE_RX=52, HOLE_RY=17;

/* ---------- state ---------- */
let S=null, running=false, over=false, tPrev=0, shake=0, shakeT=0;
let mouse={x:-99,y:-99,swing:0};
function reset(mode){
  S={
    mode, t:0, score:0, bonks:0, combo:0,
    hearts:3, timeLeft:60,
    pops:[],                    /* {cell,kind,vi,state,t,dwell,warned} */
    nextPop:0.7,
    golden:0, goldenCD:0,
    floats:[], parts:[],
    lastTick:99
  };
}
function dwellNow(){ /* ramps 1.2 -> 0.55 over ~70 bonks */
  return Math.max(0.55, 1.2-S.bonks*0.0093);
}
function maxSimul(){return S.bonks<12?1:(S.bonks<32?2:3);}
function billChance(){return Math.min(0.16, 0.08+S.bonks*0.0012);}

/* ---------- spawning ---------- */
function rnd(n){return Math.random()*n;}
function freeCells(){
  const used=new Set(S.pops.map(p=>p.cell));
  return HOLES.map((_,i)=>i).filter(i=>!used.has(i));
}
function billActive(){return S.pops.some(p=>p.kind==='bill');}
function spawnPop(){
  const free=freeCells();
  if(!free.length)return;
  const cell=free[(Math.random()*free.length)|0];
  const r=Math.random();
  let kind='gnome';
  const bc=billChance();
  if(r<bc&&!billActive())kind='bill';
  else if(r<bc+0.07)kind='rat';
  else if(r<bc+0.13)kind='slug';
  else if(r<bc+0.18)kind='frog';
  else if(r<bc+0.23)kind='toad';
  else if(r<bc+0.27&&S.bonks>=12)kind='spider';
  else if(r<bc+0.32&&S.golden<=0&&S.goldenCD<=0)kind='gold';
  const DWM={rat:0.62,slug:1.5,frog:0.8,toad:0.8,spider:0.5,bill:1.25,gnome:1,gold:1};
  const dw=dwellNow()*(S.golden>0?1.4:1)*DWM[kind];
  S.pops.push({cell,kind,vi:(Math.random()*7)|0,state:'rise',t:0,dwell:dw,warned:false});
}

/* ---------- scoring ---------- */
function floats(text,c,x,y){S.floats.push({text,c,x,y,t:1.0});}
function burst(x,y,c,n=8){
  for(let i=0;i<n;i++)S.parts.push({x,y,vx:(Math.random()-0.5)*180,vy:-rnd(160)-50,c,t:0.45+rnd(0.3)});
}
function addShake(m,t){shake=m;shakeT=t;}
function whack(cell){
  if(!running||over)return;
  mouse.swing=0.13;
  const p=S.pops.find(o=>o.cell===cell&&(o.state==='rise'||o.state==='idle'));
  const H=HOLES[cell];
  if(!p){ /* whiff */
    S.combo=0;
    sfx.whiff();
    return;
  }
  const mult=S.golden>0?2:1;
  if(p.kind==='gnome'){
    p.state='bonked';p.t=0;
    S.combo++;S.bonks++;
    const pts=(10+2*Math.min(5,S.combo-1))*mult;
    S.score+=pts;
    sfx.bonk();
    floats('BONK! +'+pts+(S.combo>2?' \u00d7'+S.combo:''),'#f2e8c9',H.x,H.y-90);
    burst(H.x,H.y-60,'#e8b840');
    addShake(3,.18);
  }else if(p.kind==='rat'||p.kind==='slug'||p.kind==='frog'||p.kind==='toad'||p.kind==='spider'){
    p.state='bonked';p.t=0;
    S.combo++;S.bonks++;
    const VAL={slug:15,frog:20,toad:20,rat:25,spider:35};
    const pts=VAL[p.kind]*mult;
    S.score+=pts;
    sfx.rat();
    floats('+'+pts+' '+p.kind.toUpperCase()+'!','#c8a06a',H.x,H.y-84);
    burst(H.x,H.y-56,p.kind==='spider'?'#9a7ac8':'#c8a06a');
  }else if(p.kind==='bill'){
    p.state='bonked';p.t=0;
    S.combo=0;
    S.score=Math.max(0,S.score-50);
    sfx.bill();
    floats('NO! THAT\u2019S BILL! -50','#e86a4a',H.x,H.y-92);
    addShake(6,.4);
  }else if(p.kind==='gold'){
    p.state='bonked';p.t=0;
    S.golden=6;S.goldenCD=17;
    sfx.golden();
    floats('GOLDEN TIME! \u00d72','#e8b840',H.x,H.y-90);
    burst(H.x,H.y-56,'#e8b840',14);
  }
}

/* ---------- input ---------- */
function cellAt(x,y){
  let best=-1,bd=1e9;
  for(let i=0;i<HOLES.length;i++){
    const H=HOLES[i];
    const dx=x-H.x, dy=y-(H.y-45);
    const d=dx*dx+dy*dy*0.7;
    if(d<bd){bd=d;best=i;}
  }
  return bd<95*95?best:-1;
}
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(CW/r.width);
  const cy=(e.clientY-r.top)*(CH/r.height);
  return [cx,cy];
}
cv.addEventListener('pointermove',e=>{
  const [x,y]=canvasPos(e);
  mouse.x=x;mouse.y=y;
});
cv.addEventListener('pointerdown',e=>{
  const [x,y]=canvasPos(e);
  mouse.x=x;mouse.y=y;
  const c=cellAt(x,y);
  if(c>=0)whack(c);
  else{mouse.swing=0.13;if(running&&!over){S.combo=0;sfx.whiff();}}
});
const KEYMAP={q:0,w:1,e:2,a:3,s:4,d:5,z:6,x:7,c:8,
              '7':0,'8':1,'9':2,'4':3,'5':4,'6':5,'1':6,'2':7,'3':8};
addEventListener('keydown',e=>{
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(KEYMAP[k]!==undefined){
    const H=HOLES[KEYMAP[k]];
    mouse.x=H.x;mouse.y=H.y-60;
    whack(KEYMAP[k]);
  }
  else if(k==='enter'&&(!running||over))start(lastMode);
});

/* ---------- flow ---------- */
const ov=document.getElementById('ov'),ovtitle=document.getElementById('ovtitle'),
      ovbody=document.getElementById('ovbody'),
      timedbtn=document.getElementById('timedbtn'),endlessbtn=document.getElementById('endlessbtn'),
      sharebtn=document.getElementById('sharebtn');
let lastMode='timed';
timedbtn.addEventListener('click',()=>start('timed'));
endlessbtn.addEventListener('click',()=>start('endless'));
sharebtn.addEventListener('click',shareCard);
function start(mode){
  lastMode=mode;
  reset(mode);
  running=true;over=false;
  ov.style.display='none';
  ac()&&ac().resume&&ac().resume();
  tPrev=performance.now();
  requestAnimationFrame(loop);
  tone(523,.1);tone(784,.12,'square',.1,.08);
}
function endRun(){
  over=true;running=false;
  sfx.over();
  const key='mmf_wag_best_'+S.mode;
  const best=+(safeStore.get(key)||0);
  const isRec=S.score>best;
  if(isRec)safeStore.set(key,String(S.score));
  ovtitle.textContent=S.mode==='timed'?"TIME'S UP!":'THE GNOMES WIN!';
  ovbody.innerHTML='SCORE: '+S.score+' &nbsp;&middot;&nbsp; '+S.bonks+' BONKS'+
    (isRec?'<br><span style="color:#e8b840">&#9733; NEW BEST! &#9733;</span>'
          :'<br>BEST: '+Math.max(best,S.score))+
    '<br><span style="color:#8fa874;font-size:7px">'+dateStamp()+'</span>';
  timedbtn.innerHTML='60-SECOND ROUND &#9654;';
  endlessbtn.innerHTML='ENDLESS &#9829;&#9829;&#9829;';
  sharebtn.style.display='inline-block';
  ov.style.display='flex';
}

/* ---------- update ---------- */
function update(dt){
  S.t+=dt;
  if(S.golden>0)S.golden-=dt;
  if(S.goldenCD>0)S.goldenCD-=dt;

  if(S.mode==='timed'){
    S.timeLeft-=dt;
    if(S.timeLeft<=5&&Math.ceil(S.timeLeft)!==S.lastTick){
      S.lastTick=Math.ceil(S.timeLeft);
      if(S.timeLeft>0)sfx.tick();
    }
    if(S.timeLeft<=0){S.timeLeft=0;endRun();return;}
  }

  /* spawner */
  S.nextPop-=dt;
  if(S.nextPop<=0){
    const want=maxSimul();
    const live=S.pops.filter(p=>p.state!=='bonked').length;
    if(live<want)spawnPop();
    S.nextPop=Math.max(0.28, dwellNow()*0.55)+rnd(0.3);
  }

  /* pop lifecycles */
  for(const p of S.pops){
    p.t+=dt;
    if(p.state==='rise'){
      if(p.kind==='bill'&&!p.warned&&p.t>0.05){p.warned=true;sfx.billwarn();}
      if(p.t>=0.18){p.state='idle';p.t=0;}
    }else if(p.state==='idle'){
      if(p.t>=p.dwell){p.state='sink';p.t=0;}
    }else if(p.state==='sink'){
      if(p.t>=0.22){
        p.dead=true;
        if(p.kind==='gnome'&&S.mode==='endless'){
          S.hearts--;S.combo=0;
          sfx.heart();
          const H=HOLES[p.cell];
          floats('GOT AWAY! -\u2665','#e86a4a',H.x,H.y-80);
          if(S.hearts<=0){endRun();return;}
        }
      }
    }else if(p.state==='bonked'){
      if(p.t>=0.38)p.dead=true;
    }
  }
  S.pops=S.pops.filter(p=>!p.dead);

  for(const f of S.floats){f.y-=32*dt;f.t-=dt;}
  S.floats=S.floats.filter(f=>f.t>0);
  for(const p of S.parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.t-=dt;}
  S.parts=S.parts.filter(p=>p.t>0);

  if(mouse.swing>0)mouse.swing-=dt;
  if(shakeT>0){shakeT-=dt;if(shakeT<=0)shake=0;}
}

/* ---------- render ---------- */
function drawSprite(key,x,y,h,alpha=1){
  const im=ART[key];
  if(!im||!im._ok)return false;
  const w=h*(im.width/im.height);
  ctx.globalAlpha=alpha;
  ctx.drawImage(im,x-w/2,y-h,w,h);
  ctx.globalAlpha=1;
  return true;
}
function render(){
  ctx.save();
  if(shake)ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake);

  /* garden painting backdrop band */
  const bg=ART.bg;
  if(bg&&bg._ok){
    const sc=CW/bg.width;
    ctx.drawImage(bg,0,0,CW,bg.height*sc);
  }else{
    ctx.fillStyle='#2d6b41';ctx.fillRect(0,0,CW,BOARD_TOP+40);
  }
  const fade=ctx.createLinearGradient(0,BOARD_TOP-70,0,BOARD_TOP+18);
  fade.addColorStop(0,'rgba(63,122,68,0)');
  fade.addColorStop(1,'#3f7a44');
  ctx.fillStyle=fade;ctx.fillRect(0,BOARD_TOP-70,CW,88);

  /* yard */
  const yard=ctx.createLinearGradient(0,BOARD_TOP,0,CH);
  yard.addColorStop(0,'#3f7a44');
  yard.addColorStop(0.5,'#57905f');
  yard.addColorStop(1,'#2b5c33');
  ctx.fillStyle=yard;ctx.fillRect(0,BOARD_TOP+16,CW,CH-BOARD_TOP);

  /* dressing */
  drawSprite('clump',36,BOARD_TOP+44,34);
  drawSprite('grasstuft',CW-40,BOARD_TOP+40,26);
  drawSprite('grasstuft',26,CH-14,30);
  drawSprite('clump',CW-34,CH-12,36);

  /* golden tint */
  if(S&&S.golden>0){
    const env=Math.min(1,S.golden*2,(6-S.golden)*3);
    ctx.fillStyle='rgba(79,216,200,'+(0.10*env)+')';
    ctx.fillRect(0,0,CW,CH);
  }

  /* holes + pops (row order for painter's overlap) */
  if(S){
    for(let i=0;i<HOLES.length;i++){
      const H=HOLES[i];
      /* dirt mound + hole */
      ctx.fillStyle='#7a5230';
      ctx.beginPath();ctx.ellipse(H.x,H.y+5,HOLE_RX+12,HOLE_RY+8,0,0,7);ctx.fill();
      ctx.fillStyle='#241a10';
      ctx.beginPath();ctx.ellipse(H.x,H.y,HOLE_RX,HOLE_RY,0,0,7);ctx.fill();
      /* pop in this hole */
      const p=S.pops.find(o=>o.cell===i);
      if(p){
        let rise=1;
        if(p.state==='rise')rise=p.t/0.18;
        else if(p.state==='sink')rise=1-p.t/0.22;
        else if(p.state==='bonked')rise=Math.max(0,1-p.t*1.6);
        rise=Math.max(0,Math.min(1,rise));
        const HT={bill:118,rat:66,gold:74,slug:52,frog:64,toad:66,spider:56,gnome:108};
        const hFull=HT[p.kind];
        /* clip so they emerge from the hole */
        ctx.save();
        ctx.beginPath();
        ctx.rect(H.x-90,H.y-hFull-40,180,hFull+40);
        ctx.ellipse(H.x,H.y,HOLE_RX+10,HOLE_RY+10,0,0,7);
        ctx.clip();
        const yBase=H.y+6-(hFull*rise-hFull*0)*1+ (1-rise)*hFull;
        const squash=p.state==='bonked'?0.72:1;
        let key;
        if(p.kind==='gnome')key=(p.state==='idle'&&p.t>p.dwell*0.25)?GT[p.vi]:GS[p.vi];
        else if(p.kind==='gold')key='chant';
        else key=p.kind;
        let hop=0;
        if((p.kind==='frog'||p.kind==='toad')&&p.state==='idle')hop=-Math.abs(Math.sin(p.t*6))*9;
        if(!drawSprite(key,H.x,H.y+6+(1-rise)*hFull+hop,hFull*squash)){
          ctx.fillStyle=p.kind==='bill'?'#f2e8c9':'#c84a2f';
          ctx.beginPath();ctx.ellipse(H.x,H.y-hFull*rise*0.5,30,hFull*rise*0.5,0,0,7);ctx.fill();
        }
        /* bill warning + glow halo */
        if(p.kind==='bill'&&p.state!=='bonked'){
          ctx.font='13px "Press Start 2P",monospace';
          ctx.textAlign='center';
          ctx.fillStyle=(((S.t*6)|0)%2)?'#e86a4a':'#f2e8c9';
          ctx.fillText('!',H.x+44,H.y-hFull*rise+4);
        }
        if(p.kind==='gold'){
          const pul=0.6+0.4*Math.sin(S.t*5);
          const gg=ctx.createRadialGradient(H.x,H.y-40*rise,4,H.x,H.y-40*rise,54);
          gg.addColorStop(0,'rgba(232,184,64,'+(0.45*pul)+')');
          gg.addColorStop(1,'rgba(232,184,64,0)');
          ctx.fillStyle=gg;ctx.fillRect(H.x-54,H.y-40*rise-54,108,108);
        }
        /* bonk stars */
        if(p.state==='bonked'){
          for(let k=0;k<3;k++){
            const a=p.t*9+k*2.1;
            ctx.fillStyle='#f7d060';
            ctx.font='10px monospace';
            ctx.fillText('\u2726',H.x+Math.cos(a)*30-4,H.y-70+Math.sin(a)*12);
          }
        }
        ctx.restore();
      }
      /* hole front lip re-draw (so sprites look inside) */
      ctx.fillStyle='#1a120a';
      ctx.beginPath();ctx.ellipse(H.x,H.y+7,HOLE_RX,HOLE_RY*0.66,0,0,Math.PI);ctx.fill();
    }

    /* particles */
    for(const p of S.parts){
      ctx.globalAlpha=Math.min(1,p.t*2.4);
      ctx.fillStyle=p.c;
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
    ctx.globalAlpha=1;

    /* floats */
    ctx.textAlign='center';
    for(const f of S.floats){
      ctx.globalAlpha=Math.min(1,f.t*2);
      ctx.font='10px "Press Start 2P",monospace';
      ctx.fillStyle='#1c1410';ctx.fillText(f.text,f.x+2,f.y+2);
      ctx.fillStyle=f.c;ctx.fillText(f.text,f.x,f.y);
    }
    ctx.globalAlpha=1;

    /* HUD plaque */
    ctx.textAlign='left';
    ctx.font='11px "Press Start 2P",monospace';
    ctx.fillStyle='rgba(26,18,10,.78)';
    ctx.fillRect(6,6,CW-12,32);
    ctx.strokeStyle='rgba(122,90,51,.8)';ctx.lineWidth=2;
    ctx.strokeRect(7,7,CW-14,30);
    ctx.fillStyle='#f2e8c9';
    ctx.fillText(String(S.score),16,28);
    if(S.combo>2){
      ctx.fillStyle='hsl('+((S.t*60)%360)+',80%,65%)';
      ctx.fillText('\u00d7'+S.combo,120,28);
    }
    if(S.golden>0){
      ctx.fillStyle='#4fd8c8';
      ctx.fillText('\u00d72 '+Math.ceil(S.golden),182,28);
    }
    ctx.textAlign='right';
    if(S.mode==='timed'){
      ctx.fillStyle=S.timeLeft<=5?'#e86a4a':'#e8b840';
      ctx.fillText(Math.ceil(S.timeLeft)+'s',CW-16,28);
    }else{
      ctx.fillStyle='#e86a4a';
      ctx.fillText('\u2665'.repeat(Math.max(0,S.hearts)),CW-16,28);
    }
    ctx.textAlign='left';
  }

  /* mallet cursor */
  if(mouse.x>=0&&(running&&!over)){
    ctx.save();
    ctx.translate(mouse.x+14,mouse.y-8);
    ctx.rotate(mouse.swing>0?-0.9:-0.35);
    ctx.fillStyle='#7a5a33';
    ctx.fillRect(-3,-2,6,34);
    ctx.fillStyle='#5a3d23';
    ctx.fillRect(-15,-18,30,20);
    ctx.fillStyle='#8a6a43';
    ctx.fillRect(-15,-18,30,6);
    ctx.restore();
  }

  ctx.restore();
}

/* ---------- loop ---------- */
function loop(t){
  const dt=Math.min(0.05,(t-tPrev)/1000);
  tPrev=t;
  if(running&&!over)update(dt);
  render();
  if(running||over)requestAnimationFrame(loop);
}
/* attract render */
reset('timed');S.pops.push({cell:4,kind:'gnome',vi:2,state:'idle',t:0.4,dwell:9,warned:false});render();S=null;reset('timed');render();
</script>
