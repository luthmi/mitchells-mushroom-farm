<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mushroom Toss — Mitchell's Mushroom Farm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{--cab:#1d2a1c;--wood:#5a3d23;--cream:#f2e8c9;--gold:#e8b840;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;background:var(--cab);}
  body{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100dvh;font-family:'Press Start 2P',monospace;color:var(--cream);
    background:radial-gradient(ellipse at 50% -10%, #34502c 0%, var(--cab) 60%);
    touch-action:none;user-select:none;-webkit-user-select:none;overflow:hidden;
  }
  #stage{width:min(98vw, calc(100dvh * 1.38), 1080px);}
  #stage.menu{width:min(94vw, calc(100dvh * 0.70), 440px);}
  #stage.menu #frame{aspect-ratio:3/4;}
  #stage.menu canvas{position:absolute;inset:0;visibility:hidden;}
  #frame{position:relative;width:100%;border:3px solid var(--wood);border-radius:10px;
    box-shadow:0 8px 40px rgba(0,0,0,.55), inset 0 0 0 2px rgba(242,232,201,.06);
    overflow:hidden;background:#0d1813;}
  canvas{display:block;width:100%;height:auto;image-rendering:auto;border-radius:7px;}
  #ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    text-align:center;padding:16px 16px 22px;gap:10px;
    background:#1d2a1c;background-size:cover;background-position:center 18%;}
  #ovshade{position:absolute;left:0;right:0;bottom:0;height:56%;
    background:linear-gradient(rgba(14,10,6,0) 0%, rgba(14,10,6,.85) 46%, rgba(10,7,4,.95) 100%);
    pointer-events:none;}
  #ov>*{position:relative;}
  #ov h2{font-size:14px;color:var(--gold);margin:0;text-shadow:0 3px 0 #1c1410;line-height:1.6;}
  #ov p{font-size:8px;line-height:2;color:var(--cream);margin:0;max-width:38ch;text-shadow:0 2px 3px rgba(0,0,0,.8);}
  .go{font-family:inherit;font-size:10px;padding:12px 18px;border-radius:9px;cursor:pointer;
    border:3px solid #7a5a33;background:linear-gradient(#f7d060,#e8b840);color:#3a2410;
    box-shadow:0 4px 0 #7a5a33;}
  .go:active{transform:translateY(3px);box-shadow:0 1px 0 #7a5a33;}
  .go.teal{background:linear-gradient(#8fd8c8,#4fd8c8);border-color:#2d7a6e;box-shadow:0 4px 0 #2d7a6e;color:#0d2b26;}
  .go.teal:active{box-shadow:0 1px 0 #2d7a6e;}
  .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .keys{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;display:none;}
  @media (hover:hover) and (pointer:fine){ .keys{display:block;} }
  #tap{font-size:7px;color:#8fa874;letter-spacing:1px;line-height:2;margin-top:10px;text-align:center;}
  @media (hover:hover) and (pointer:fine){ #tap{display:none;} }
</style>

  <div id="frame">
    <canvas id="cv" width="1600" height="1160"></canvas>
    <div id="ov">
      <div id="ovshade"></div>
      <h2 id="ovtitle"></h2>
      <p id="ovbody">9 mushrooms &middot; stick the board +10 &middot; hole +30<br>bonk a gnome +25 &middot; golden chanterelle = &times;2<br><b>mind the wind &middot; NEVER hit Bill!</b></p>
      <div class="btnrow">
        <button class="go" id="startbtn">LOOSE! &#9654;</button>
        <button class="go teal" id="sharebtn" style="display:none">SHARE SCORE &#128248;</button>

<script>
'use strict';
/* ============ MUSHROOM TOSS ============
   Arcade cabinet #3. Trebuchet-meets-cornhole:
   lob mushrooms at the gnome camp. */

const CW=800, CH=580, RS=2;
const cv=document.getElementById('cv');
cv.width=CW*RS; cv.height=CH*RS;
const ctx=cv.getContext('2d');
ctx.scale(RS,RS);

const safeStore={
  get(k){try{return localStorage.getItem(k);}catch(e){return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){}}
};

/* ---------- synth ---------- */
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function tone(f,d=0.1,type='sine',v=0.14,delay=0,slide=0){
  const a=ac(); if(!a)return;
  const t0=a.currentTime+delay;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),t0+d);
  g.gain.setValueAtTime(v,t0);g.gain.exponentialRampToValueAtTime(0.0001,t0+d);
  o.connect(g);g.connect(a.destination);o.start(t0);o.stop(t0+d+0.02);
}
const sfx={
  creak(){tone(90,.14,'sawtooth',.06,0,40);},
  loose(){tone(180,.12,'square',.1,0,220);tone(70,.16,'sawtooth',.08);},
  board(){tone(220,.08,'square',.12,0,-60);tone(160,.06,'square',.08,.05);},
  hole(){tone(523,.09,'sine',.12);tone(659,.09,'sine',.11,.07);tone(784,.16,'sine',.11,.14);},
  bonk(){tone(150,.09,'square',.16,0,-40);tone(900,.05,'square',.07);},
  bill(){tone(190,.28,'square',.14,0,-110);tone(150,.3,'square',.1,.16,-70);},
  golden(){tone(523,.1,'sine',.11);tone(784,.12,'sine',.1,.09);tone(1046,.2,'sine',.09,.18);},
  thud(){tone(110,.1,'triangle',.1,0,-30);},
  giggle(){tone(600,.06,'square',.06,0,120);tone(700,.06,'square',.06,.08,120);},
  over(){tone(392,.2,'triangle',.12);tone(523,.24,'triangle',.12,.18);tone(659,.4,'triangle',.12,.38);}
};

/* ---------- field geometry ---------- */
const GROUND=506;
const G_ACC=480;
const TREB={x:64,y:GROUND,armLen:52};
/* cornhole board: angled plank, low end toward the trebuchet */
const BOARD={x1:530,y1:GROUND,x2:660,y2:462,holeX:632,holeY:472,holeR:14};
/* gnome standing spots */
const SPOTS=[
  {x:475,y:GROUND,board:false},
  {x:705,y:GROUND,board:false},
  {x:752,y:GROUND,board:false},
  {x:405,y:GROUND,board:false},
  {x:685,y:GROUND,board:false},
  {x:288,y:474,board:true}          /* ON the board, guarding the hole */
];
const GOLD_SPOT={x:752,y:436};       /* chanterelle on the stump */

/* ---------- state ---------- */
let S=null, running=false, over=false, tPrev=0;
function rnd(n){return Math.random()*n;}
function reset(){
  S={
    score:0, toss:0, TOSSES:9,
    holes:0, bonks:0, streak:0,
    golden:false,
    wind:Math.round((Math.random()*80-40)/5)*5,
    proj:null,                     /* {x,y,vx,vy,sprite,mane,alive} */
    stuck:[],                      /* mushrooms resting on the board */
    gnomes:(()=>{
      const vis=[0,1,2,3,4,5,6];
      for(let i=vis.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[vis[i],vis[j]]=[vis[j],vis[i]];}
      return [{spot:0,vi:vis[0],taunt:0,bonk:0},
              {spot:1,vi:vis[1],taunt:0,bonk:0},
              {spot:2,vi:vis[2],taunt:0,bonk:0}];
    })(),
    bill:null, billT:0,
    goldTarget:true,
    maneToss:1+((Math.random()*8)|0),   /* which toss is the lion's mane */
    aim:null,                      /* {ax,ay,dx,dy} while dragging */
    kb:{angle:52,power:0,charging:false},
    armT:1,                        /* 1 = cocked, 0 = released (animates) */
    floats:[], parts:[],
    t:0, scored:false
  };
}
function isMane(){return S.toss+1===S.maneToss;}
function curSprite(){
  if(isMane())return 'm_mane';
  return SHROOMS[(S.toss*3+1)%SHROOMS.length];
}

/* ---------- gnome & bill choreography ---------- */
function shuffleGnomes(){
  for(const gn of S.gnomes){
    if(Math.random()<0.5){
      const used=S.gnomes.map(g2=>g2.spot);
      const free=SPOTS.map((_,i)=>i).filter(i=>!used.includes(i));
      /* board spot only 25% of the time it's offered */
      const pick2=free.filter(i=>!SPOTS[i].board||Math.random()<0.25);
      if(pick2.length)gn.spot=pick2[(Math.random()*pick2.length)|0];
    }
    gn.bonk=0;   /* taunts persist through the scamper */
  }
  /* Bill wanders in ~12% of tosses */
  if(!S.bill&&Math.random()<0.12){
    S.bill={x:CW+30,dir:-1};
  }
}

/* ---------- firing ---------- */
function floats(text,c,x,y){S.floats.push({text,c,x,y,t:1.1});}
function burst(x,y,c,n=8){
  for(let i=0;i<n;i++)S.parts.push({x,y,vx:(Math.random()-0.5)*160,vy:-rnd(140)-40,c,t:0.4+rnd(0.3)});
}
function fire(vx,vy){
  if(S.proj||S.toss>=S.TOSSES)return;
  const tip=armTip(1);
  S.proj={x:tip.x,y:tip.y,vx,vy,sprite:curSprite(),mane:isMane(),alive:true,spin:0};
  S.armT=0;
  S.scored=false;
  sfx.loose();
}
function armTip(t){ /* t=1 cocked (arm back over the frame), t=0 released (arm forward-up) */
  const a=Math.PI*0.82-t*Math.PI*0.52;
  return {x:TREB.x+Math.cos(a)*TREB.armLen*1.35, y:TREB.y-34-Math.sin(a)*TREB.armLen*1.35};
}
function endToss(){
  S.proj=null;
  S.toss++;
  if(!S.scored){
    S.streak=0;
    /* the gnomes mock you */
    for(const gn of S.gnomes)if(Math.random()<0.7)gn.taunt=0.9;
    sfx.giggle();
  }else{
    S.streak++;
    if(S.streak===3){
      S.score+=15;
      floats('HOT HAND! +15','#e8b840',CW/2,220);
    }
  }
  S.wind=Math.round((Math.random()*80-40)/5)*5;
  shuffleGnomes();
  if(S.toss>=S.TOSSES)endRun();
}
function scorePts(base,label,x,y,col){
  let pts=base*(S.golden?2:1);
  if(S.proj&&S.proj.mane)pts*=2;
  S.score+=pts;
  S.scored=true;
  floats(label+' +'+pts,col,x,y);
  return pts;
}

/* ---------- physics step ---------- */
function bounce(p,nx,ny,rest,minSp){
  const L=Math.hypot(nx,ny)||1;nx/=L;ny/=L;
  const d=p.vx*nx+p.vy*ny;
  p.vx-=2*d*nx;p.vy-=2*d*ny;
  const sp=Math.hypot(p.vx,p.vy);
  const want=Math.max(sp*rest,minSp);
  if(sp>0){p.vx*=want/sp;p.vy*=want/sp;}
  p.bounces=(p.bounces||0)+1;
}
function segDist(px,py,x1,y1,x2,y2){
  const dx=x2-x1, dy=y2-y1;
  const L2=dx*dx+dy*dy;
  let t=((px-x1)*dx+(py-y1)*dy)/L2;
  t=Math.max(0,Math.min(1,t));
  const qx=x1+t*dx, qy=y1+t*dy;
  return Math.hypot(px-qx,py-qy);
}
function stepProj(dt){
  const p=S.proj;
  if(!p||!p.alive)return;
  p.vx+=S.wind*0.35*dt;
  p.vy+=G_ACC*(p.mane?0.7:1)*dt;
  p.x+=p.vx*dt;
  p.y+=p.vy*dt;
  p.spin+=dt*6;

  /* gnome bonk (generous circle) */
  for(const gn of S.gnomes){
    if(gn.bonk>0)continue;
    const sp=SPOTS[gn.spot];
    const gx=sp.x, gy=sp.y-34;
    if(Math.hypot(p.x-gx,p.y-gy)<30){
      gn.bonk=0.9;
      scorePts(25,'BONK!',sp.x,sp.y-84,'#f2e8c9');
      sfx.bonk();
      burst(p.x,p.y,'#e8b840');
      /* carom off the gnome and keep flying */
      const nx=p.x-gx, ny=p.y-gy;
      bounce(p,nx,ny,0.6,150);
      const L=Math.hypot(nx,ny)||1;
      p.x=gx+(nx/L)*32;p.y=gy+(ny/L)*32;
      return;
    }
  }
  /* Bill: the unforgivable */
  if(S.bill&&!p.hitBill){
    const bx=S.bill.x, by=GROUND-36;
    if(Math.hypot(p.x-bx,p.y-by)<32){
      p.hitBill=true;
      S.score=Math.max(0,S.score-50);
      S.scored=false;
      floats("THAT'S BILL! -50",'#e86a4a',S.bill.x,GROUND-96);
      sfx.bill();
      const nx=p.x-bx, ny=p.y-by;
      bounce(p,nx,ny,0.5,120);
      const L=Math.hypot(nx,ny)||1;
      p.x=bx+(nx/L)*34;p.y=by+(ny/L)*34;
      return;
    }
  }
  /* golden chanterelle on the stump */
  if(S.goldTarget&&Math.hypot(p.x-GOLD_SPOT.x,p.y-GOLD_SPOT.y)<20){
    S.goldTarget=false;
    S.golden=true;
    S.scored=true;
    floats('GOLDEN! \u00d72 REST OF ROUND','#e8b840',GOLD_SPOT.x-40,GOLD_SPOT.y-40);
    sfx.golden();
    burst(GOLD_SPOT.x,GOLD_SPOT.y,'#e8b840',14);
    bounce(p,p.x-GOLD_SPOT.x,p.y-GOLD_SPOT.y,0.5,130);
    return;
  }
  /* the hole (checked before board face; needs downward travel) */
  if(p.vy>0&&Math.hypot(p.x-BOARD.holeX,p.y-BOARD.holeY)<BOARD.holeR){
    S.holes++;
    const banked=(p.bounces||0)>0, skipped=(p.groundBounces||0)>0;
    const label=banked?'BANK SHOT!':(skipped?'SKIP SHOT!':'IN THE HOLE!');
    scorePts(30+((banked||skipped)?10:0),label,BOARD.holeX,BOARD.holeY-46,'#9fd8e8');
    sfx.hole();
    burst(BOARD.holeX,BOARD.holeY-8,'#9fd8e8',12);
    p.alive=false;
    finishFlight();
    return;
  }
  /* stick the board */
  if(p.vy>0&&segDist(p.x,p.y,BOARD.x1,BOARD.y1,BOARD.x2,BOARD.y2)<7){
    scorePts(10,'STUCK IT!',p.x,p.y-30,'#f2e8c9');
    sfx.board();
    S.stuck.push({x:p.x,y:p.y,sprite:p.sprite});
    if(S.stuck.length>8)S.stuck.shift();
    p.alive=false;
    finishFlight();
    return;
  }
  /* ground: skip off the grass when coming in hot, settle when spent */
  if(p.y>=GROUND-4){
    const sp=Math.hypot(p.vx,p.vy);
    if(sp>90&&(p.groundBounces||0)<3){
      p.y=GROUND-4;
      p.vy=-Math.abs(p.vy)*0.45;
      p.vx*=0.78;
      p.groundBounces=(p.groundBounces||0)+1;
      burst(p.x,GROUND-6,'rgba(122,90,51,.6)',4);
      tone(110,.06,'triangle',.06,0,-20);
      return;
    }
    sfx.thud();
    burst(p.x,GROUND-6,'rgba(122,90,51,.8)',6);
    p.alive=false;
    finishFlight();
    return;
  }
  if(p.x>CW+40||p.x<-40||p.y<-140){
    p.alive=false;
    finishFlight();
  }
}
let flightTimer=null;
function finishFlight(){
  /* brief beat so the player sees the result, then next toss */
  if(flightTimer)clearTimeout(flightTimer);
  flightTimer=setTimeout(()=>{if(running&&!over)endToss();},650);
}

/* ---------- aiming ---------- */
function launchFromDrag(dx,dy){
  /* pull back & down -> fling forward & up */
  const px=Math.max(0,Math.min(1,Math.hypot(dx,dy)/150));
  const ang=Math.atan2(-dy,-dx);          /* opposite the drag */
  const sp=180+px*360;
  return {vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp, px};
}
function canvasPos(e){
  const r=cv.getBoundingClientRect();
  return [(e.clientX-r.left)*(CW/r.width),(e.clientY-r.top)*(CH/r.height)];
}
cv.addEventListener('pointerdown',e=>{
  if(!running||over||S.proj)return;
  const [x,y]=canvasPos(e);
  S.aim={ax:x,ay:y,dx:0,dy:0};
  sfx.creak();
});
cv.addEventListener('pointermove',e=>{
  if(!S||!S.aim)return;
  const [x,y]=canvasPos(e);
  S.aim.dx=x-S.aim.ax;S.aim.dy=y-S.aim.ay;
});
addEventListener('pointerup',()=>{
  if(!S||!S.aim)return;
  const {dx,dy}=S.aim;
  S.aim=null;
  if(Math.hypot(dx,dy)<18)return;         /* too soft: cancel */
  const v=launchFromDrag(dx,dy);
  if(v.vy<0||true)fire(v.vx,v.vy);
});
addEventListener('keydown',e=>{
  if(e.repeat)return;
  const k=e.key.toLowerCase();
  if(k==='arrowleft'){if(S)S.kb.angle=Math.min(80,S.kb.angle+4);}
  else if(k==='arrowright'){if(S)S.kb.angle=Math.max(20,S.kb.angle-4);}
  else if(k===' '&&running&&!over&&!S.proj){e.preventDefault();S.kb.charging=true;S.kb.power=0;sfx.creak();}
  else if(k==='enter'&&(!running||over))start();
});
addEventListener('keyup',e=>{
  if(e.key===' '&&S&&S.kb.charging){
    S.kb.charging=false;
    const a=S.kb.angle*Math.PI/180;
    const sp=180+S.kb.power*360;
    fire(Math.cos(a)*sp,-Math.sin(a)*sp);
  }
});

/* ---------- flow ---------- */
const ov=document.getElementById('ov'),ovtitle=document.getElementById('ovtitle'),
      ovbody=document.getElementById('ovbody'),startbtn=document.getElementById('startbtn'),
      sharebtn=document.getElementById('sharebtn');
startbtn.addEventListener('click',start);
sharebtn.addEventListener('click',shareCard);
const stage=document.getElementById('stage');
function start(){
  reset();
  running=true;over=false;
  stage.classList.remove('menu');
  ov.style.display='none';
  ac()&&ac().resume&&ac().resume();
  tPrev=performance.now();
  requestAnimationFrame(loop);
  tone(523,.1);tone(784,.12,'square',.1,.08);
}
function endRun(){
  over=true;running=false;
  sfx.over();
  const best=+(safeStore.get('mmf_toss_best')||0);
  const isRec=S.score>best;
  if(isRec)safeStore.set('mmf_toss_best',String(S.score));
  ovtitle.textContent=S.holes>=3?'SHARPSHOOTER!':'ROUND OVER';
  ovbody.innerHTML='SCORE: '+S.score+' &nbsp;&middot;&nbsp; '+S.holes+' IN THE HOLE &nbsp;&middot;&nbsp; '+S.bonks+' BONKS'+
    (isRec?'<br><span style="color:#e8b840">&#9733; NEW BEST! &#9733;</span>'
          :'<br>BEST: '+Math.max(best,S.score))+
    '<br><span style="color:#8fa874;font-size:7px">'+dateStamp()+'</span>';
  startbtn.innerHTML='TOSS AGAIN &#9654;';
  sharebtn.style.display='inline-block';
  stage.classList.add('menu');
  ov.style.display='flex';
}

/* ---------- update ---------- */
function update(dt){
  S.t+=dt;
  if(S.armT<1)S.armT=Math.min(1,S.armT+dt*2.2);   /* arm re-cocks */
  if(S.kb.charging)S.kb.power=(Math.sin(S.t*4.5)*0.5+0.5);
  if(S.proj&&S.proj.alive){
    /* fixed substeps for stable collisions */
    for(let i=0;i<3;i++)stepProj(dt/3);
  }
  for(const gn of S.gnomes){
    if(gn.taunt>0)gn.taunt-=dt;
    if(gn.bonk>0){gn.bonk-=dt;if(gn.bonk<=0){S.bonks++;}}
  }
  if(S.bill){
    S.bill.x+=S.bill.dir*26*dt;
    if(S.bill.x<180){S.bill.dir=1;}
    if(S.bill.x>CW+34)S.bill=null;
  }
  for(const f of S.floats){f.y-=26*dt;f.t-=dt;}
  S.floats=S.floats.filter(f=>f.t>0);
  for(const p of S.parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.t-=dt;}
  S.parts=S.parts.filter(p=>p.t>0);
}

/* ---------- render ---------- */
function drawSprite(k,x,y,h,flip){
  const im=ART[k];
  if(!im||!im._ok)return false;
  const w=h*(im.width/im.height);
  ctx.save();
  if(flip){ctx.translate(x,0);ctx.scale(-1,1);ctx.translate(-x,0);}
  ctx.drawImage(im,x-w/2,y-h,w,h);
  ctx.restore();
  return true;
}
function render(){
  /* sky */
  const sky=ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#3f9fd8');
  sky.addColorStop(0.7,'#8fc8e0');
  sky.addColorStop(1,'#c8e0d0');
  ctx.fillStyle=sky;ctx.fillRect(0,0,CW,GROUND);
  /* clouds */
  ctx.fillStyle='rgba(247,240,220,.85)';
  for(let i=0;i<4;i++){
    const cx=((i*137+(S?S.t*4:0))%(CW+120))-60, cy=54+i*38;
    ctx.beginPath();
    ctx.ellipse(cx,cy,34,12,0,0,7);
    ctx.ellipse(cx+22,cy-6,22,10,0,0,7);
    ctx.ellipse(cx-20,cy-4,20,9,0,0,7);
    ctx.fill();
  }
  /* forest edge: the farm's own trees across the back */
  ctx.fillStyle='#1c4534';
  ctx.fillRect(0,GROUND-104,CW,104);
  const TREES=[
    ['oak',    36, 158],
    ['tree_2', 118, 132],
    ['tree_0', 196, 148],
    ['tree_5', 274, 128],
    ['tree_3', 352, 150],
    ['tree_6', 416, 126]
  ];
  for(const [k,tx,th] of TREES){
    if(!drawSprite(k,tx,GROUND-26,th)){
      ctx.fillStyle='#2d5a44';
      ctx.beginPath();
      ctx.moveTo(tx-20,GROUND-40);
      ctx.lineTo(tx,GROUND-40-th*0.8);
      ctx.lineTo(tx+20,GROUND-40);
      ctx.closePath();ctx.fill();
    }
  }
  /* canopy shade line grounding the trunks */
  ctx.fillStyle='rgba(20,40,30,.5)';
  ctx.fillRect(0,GROUND-30,CW,6);
  /* meadow */
  const gr=ctx.createLinearGradient(0,GROUND-6,0,CH);
  gr.addColorStop(0,'#57905f');
  gr.addColorStop(1,'#2b5c33');
  ctx.fillStyle=gr;ctx.fillRect(0,GROUND-6,CW,CH-GROUND+6);

  /* stones at the forest's feet: in front of the trees, behind the field */
  drawSprite('rockpair',180,GROUND-2,26);
  drawSprite('mossmound',300,GROUND,30);
  drawSprite('pointy',420,GROUND-2,24);
  drawSprite('rockgrass',560,GROUND,26);
  drawSprite('rockpair',720,GROUND-1,22,true);

  drawSprite('bush',40,GROUND-64,44);
  drawSprite('grass',150,GROUND+18,26);
  drawSprite('grass',380,GROUND+22,28);
  drawSprite('grass',620,GROUND+18,26);
  drawSprite('grass',764,GROUND+22,28);

  if(S){
    /* stump + golden chanterelle target */
    drawSprite('stump',GOLD_SPOT.x,GROUND+2,64);
    if(S.goldTarget){
      const pul=1+0.08*Math.sin(S.t*4);
      drawSprite('m_chant',GOLD_SPOT.x,GOLD_SPOT.y+16,30*pul);
      const gg=ctx.createRadialGradient(GOLD_SPOT.x,GOLD_SPOT.y,3,GOLD_SPOT.x,GOLD_SPOT.y,24);
      gg.addColorStop(0,'rgba(232,184,64,.4)');
      gg.addColorStop(1,'rgba(232,184,64,0)');
      ctx.fillStyle=gg;ctx.fillRect(GOLD_SPOT.x-24,GOLD_SPOT.y-24,48,48);
    }

    /* cornhole board */
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.22)';
    ctx.beginPath();ctx.ellipse((BOARD.x1+BOARD.x2)/2,GROUND+4,52,8,0,0,7);ctx.fill();
    /* legs */
    ctx.strokeStyle='#4a3018';ctx.lineWidth=7;
    ctx.beginPath();
    ctx.moveTo(BOARD.x2-6,BOARD.y2+4);ctx.lineTo(BOARD.x2-20,GROUND);
    ctx.stroke();
    /* plank */
    const ang=Math.atan2(BOARD.y2-BOARD.y1,BOARD.x2-BOARD.x1);
    ctx.translate(BOARD.x1,BOARD.y1);
    ctx.rotate(ang);
    const L=Math.hypot(BOARD.x2-BOARD.x1,BOARD.y2-BOARD.y1);
    ctx.fillStyle='#8a6238';
    ctx.fillRect(0,-9,L,18);
    ctx.fillStyle='#a07a4a';
    ctx.fillRect(0,-9,L,6);
    ctx.strokeStyle='#5a3d23';ctx.lineWidth=2;
    ctx.strokeRect(0,-9,L,18);
    ctx.restore();
    /* the hole */
    ctx.fillStyle='#241a10';
    ctx.beginPath();ctx.ellipse(BOARD.holeX,BOARD.holeY,BOARD.holeR,BOARD.holeR*0.55,-0.5,0,7);ctx.fill();
    ctx.strokeStyle='#e8b840';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(BOARD.holeX,BOARD.holeY,BOARD.holeR+2,BOARD.holeR*0.55+2,-0.5,0,7);ctx.stroke();
    /* stuck mushrooms resting on the plank */
    for(const st of S.stuck)drawSprite(st.sprite,st.x,st.y+8,22);

    /* gnomes */
    for(const gn of S.gnomes){
      const sp=SPOTS[gn.spot];
      const key=gn.taunt>0?GT[gn.vi]:GS[gn.vi];
      const squash=gn.bonk>0?0.72:1;
      const dy=gn.bonk>0?6:0;
      drawSprite(key,sp.x,sp.y+dy,64*squash,sp.x<TREB.x);
      if(gn.bonk>0){
        for(let k=0;k<3;k++){
          const a=S.t*9+k*2.1;
          ctx.fillStyle='#f7d060';
          ctx.font='9px monospace';
          ctx.fillText('\u2726',sp.x+Math.cos(a)*24-4,sp.y-70+Math.sin(a)*10);
        }
      }
    }
    /* Bill */
    if(S.bill)drawSprite('bill',S.bill.x,GROUND,72,S.bill.dir>0);

    /* trebuchet (painted, matches the poster silhouette) */
    ctx.save();
    ctx.translate(TREB.x,TREB.y);
    ctx.fillStyle='rgba(0,0,0,.25)';
    ctx.beginPath();ctx.ellipse(0,2,44,7,0,0,7);ctx.fill();
    /* A-frame */
    ctx.strokeStyle='#5a3d23';ctx.lineWidth=9;
    ctx.beginPath();
    ctx.moveTo(-26,0);ctx.lineTo(0,-36);ctx.lineTo(26,0);
    ctx.moveTo(-14,-16);ctx.lineTo(14,-16);
    ctx.stroke();
    ctx.strokeStyle='#7a5a33';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(-26,0);ctx.lineTo(0,-36);ctx.lineTo(26,0);ctx.stroke();
    /* arm */
    const t=S.armT;
    const a=Math.PI*0.82-t*Math.PI*0.52;
    ctx.strokeStyle='#6a4a28';ctx.lineWidth=7;
    ctx.beginPath();
    ctx.moveTo(-Math.cos(a)*18,-34+Math.sin(a)*18);   /* counterweight side */
    ctx.lineTo(Math.cos(a)*TREB.armLen*1.35,-34-Math.sin(a)*TREB.armLen*1.35);
    ctx.stroke();
    /* counterweight box */
    ctx.fillStyle='#5a3d23';
    ctx.fillRect(-Math.cos(a)*18-10,-34+Math.sin(a)*18-4,20,16);
    ctx.strokeStyle='#3a2410';ctx.lineWidth=2;
    ctx.strokeRect(-Math.cos(a)*18-10,-34+Math.sin(a)*18-4,20,16);
    ctx.restore();
    /* loaded mushroom in the sling (when cocked & ready) */
    if(!S.proj&&S.toss<S.TOSSES&&S.armT>0.95){
      const tip=armTip(1);
      drawSprite(curSprite(),tip.x,tip.y+14,26);
      if(isMane()){
        ctx.font='7px "Press Start 2P",monospace';
        ctx.textAlign='center';
        ctx.fillStyle='#e8b840';
        ctx.fillText('\u00d72!',tip.x,tip.y-22);
        ctx.textAlign='left';
      }
    }

    /* aim preview: dotted arc */
    let vprev=null;
    if(S.aim&&Math.hypot(S.aim.dx,S.aim.dy)>=18){
      const v=launchFromDrag(S.aim.dx,S.aim.dy);
      vprev=v;
    }else if(S.kb.charging){
      const a2=S.kb.angle*Math.PI/180;
      const sp=180+S.kb.power*360;
      vprev={vx:Math.cos(a2)*sp,vy:-Math.sin(a2)*sp,px:S.kb.power};
    }
    if(vprev&&!S.proj){
      const tip=armTip(1);
      let px=tip.x,py=tip.y,vx=vprev.vx,vy=vprev.vy;
      ctx.fillStyle='rgba(242,232,201,.75)';
      for(let i=0;i<26;i++){
        vx+=S.wind*0.35*(1/30);
        vy+=G_ACC*(1/30);
        px+=vx*(1/30);py+=vy*(1/30);
        if(py>GROUND)break;
        if(i%3===0)ctx.fillRect(px-1.5,py-1.5,3,3);
      }
      /* power bar */
      ctx.fillStyle='rgba(26,18,10,.7)';
      ctx.fillRect(20,CH-160,14,90);
      ctx.fillStyle='#e8b840';
      ctx.fillRect(22,CH-70-(vprev.px*86),10,vprev.px*86);
      ctx.strokeStyle='#7a5a33';ctx.lineWidth=2;
      ctx.strokeRect(20,CH-160,14,90);
    }

    /* the flying mushroom */
    if(S.proj&&S.proj.alive){
      ctx.save();
      ctx.translate(S.proj.x,S.proj.y);
      ctx.rotate(S.proj.spin);
      const im=ART[S.proj.sprite];
      if(im&&im._ok){
        const h=S.proj.mane?30:24, w=h*(im.width/im.height);
        ctx.drawImage(im,-w/2,-h/2,w,h);
      }else{
        ctx.fillStyle='#d9903c';
        ctx.beginPath();ctx.arc(0,0,10,0,7);ctx.fill();
      }
      ctx.restore();
    }

    /* particles + floats */
    for(const p of S.parts){
      ctx.globalAlpha=Math.min(1,p.t*2.4);
      ctx.fillStyle=p.c;
      ctx.fillRect(p.x-2,p.y-2,4,4);
    }
    ctx.globalAlpha=1;
    ctx.textAlign='center';
    for(const f of S.floats){
      ctx.globalAlpha=Math.min(1,f.t*2);
      ctx.font='10px "Press Start 2P",monospace';
      ctx.fillStyle='#1c1410';ctx.fillText(f.text,f.x+2,f.y+2);
      ctx.fillStyle=f.c;ctx.fillText(f.text,f.x,f.y);
    }
    ctx.globalAlpha=1;

    /* HUD */
    ctx.textAlign='left';
    ctx.font='11px "Press Start 2P",monospace';
    ctx.fillStyle='rgba(26,18,10,.78)';
    ctx.fillRect(6,6,CW-12,32);
    ctx.strokeStyle='rgba(122,90,51,.8)';ctx.lineWidth=2;
    ctx.strokeRect(7,7,CW-14,30);
    ctx.fillStyle='#f2e8c9';
    ctx.fillText(String(S.score),16,28);
    if(S.golden){
      ctx.fillStyle='#e8b840';
      ctx.fillText('\u00d72',110,28);
    }
    /* wind gauge */
    ctx.fillStyle='#9fd8e8';
    const wtxt=(S.wind===0?'CALM':(S.wind>0?'\u2192':'\u2190')+' '+Math.abs(S.wind));
    ctx.fillText('WIND '+wtxt,158,28);
    ctx.textAlign='right';
    ctx.fillStyle='#e8b840';
    ctx.fillText('\u{1F344}'+(S.TOSSES-S.toss),CW-16,28);
    ctx.textAlign='left';
  }
}

/* ---------- loop ---------- */
function loop(t){
  const dt=Math.min(0.05,(t-tPrev)/1000);
  tPrev=t;
  if(running&&!over)update(dt);
  render();
  if(running||over)requestAnimationFrame(loop);
}
/* attract render */
document.getElementById('stage').classList.add('menu');
reset();render();
</script>
</body>
</html>
