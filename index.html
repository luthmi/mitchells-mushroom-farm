<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Mitchell's Mushroom Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{--wood:#5a3d23;--cream:#f2e8c9;--gold:#e8b840;--teal:#4fd8c8;}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;background:#000;}
  body{font-family:'Press Start 2P',monospace;color:var(--cream);background:#000;
    height:100vh;display:flex;flex-direction:column;padding:14px;gap:12px;overflow:hidden;}
  #marquee{width:auto;height:13%;max-height:104px;display:block;margin:0 auto;flex:0 0 auto;
    object-fit:contain;filter:drop-shadow(0 6px 16px rgba(0,0,0,.7));}
  #cabs{flex:1 1 auto;display:grid;gap:11px;min-height:0;
    grid-template-columns:1fr 1fr;
    grid-template-rows:0.9fr 1fr 1fr 1fr;}
  a.cab{position:relative;text-decoration:none;border:3px solid var(--wood);
    border-radius:11px;overflow:hidden;background:#0a0a0a;min-height:0;min-width:0;
    box-shadow:0 4px 0 #000, inset 0 0 20px rgba(0,0,0,.4);}
  a.cab.wide{grid-column:1/-1;grid-row:1;}
  a.cab img{width:100%;height:100%;object-fit:cover;display:block;}
  a.cab:active{transform:translateY(2px);box-shadow:0 2px 0 #000;}
  a.cab .best{position:absolute;left:0;right:0;bottom:0;
    font-size:8px;color:var(--teal);letter-spacing:1px;text-align:center;
    padding:5px 4px;background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.9) 58%);
    text-shadow:0 1px 2px #000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #wrap{display:contents;}
  #foot{display:none;}
</style>
</head>

<script>
(function(){
  /* farm card: on wide layouts it is the tall right card; give the 'big' slot to it too */
  var wrap=document.getElementById('wrap');
  var farm=document.getElementById('farm');
  function relayout(){
    /* farm spans its area; the hidden #big anchor just reserves grid area — merge visually */
    var wide=!matchMedia('(max-aspect-ratio:4/5)').matches;
    farm.style.gridArea=wide?'1 / 3 / 3 / 4':'farm';
  }
  relayout();addEventListener('resize',relayout);
  function get(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  document.querySelectorAll('.best').forEach(function(el){
    var v=null;
    if(el.dataset.key){v=get(el.dataset.key);}
    else if(el.dataset.prefix){
      try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);
        if(k&&k.indexOf(el.dataset.prefix)===0){var n=parseInt(localStorage.getItem(k),10);
        if(!isNaN(n))v=Math.max(v||0,n);}}}catch(e){}
    }
    if(v!==null&&v!==''&&!isNaN(parseInt(v,10)))el.innerHTML='HIGH SCORE '+parseInt(v,10);
  });
})();
</script>
